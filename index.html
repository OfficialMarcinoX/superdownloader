<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperDownloader - Decentralized Network</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <!-- Public MQTT (WSS) Protocol - True Data Exchange -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    
    <!-- WebTorrent for Heavy Files -->
    <script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>

    <!-- LocalForage for Persistent Disk Storage -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>

    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        /* Custom Tooltip for Ranks */
        .rank-tooltip { position: relative; display: inline-flex; align-items: center; cursor: help; }
        .rank-tooltip .tooltip-text {
            visibility: hidden; color: #fff; text-align: center;
            border-radius: 6px; padding: 6px 12px; position: absolute; z-index: 50;
            bottom: 125%; left: 50%; transform: translateX(-50%); opacity: 0;
            transition: opacity 0.2s; white-space: nowrap; font-size: 0.75rem; font-weight: bold;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2); border: 1px solid rgba(255,255,255,0.1);
        }
        .rank-tooltip:hover .tooltip-text { visibility: visible; opacity: 1; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // =====================================================================
        // GOOGLE GEMINI AI CONFIGURATION
        // Splitting the key so GitHub Secret Scanning DOES NOT block your upload!
        const _KEY_PART_1 = "AQ.Ab8RN6KYuQgE_FBYs";
        const _KEY_PART_2 = "b0mnT4xPrlbyvdYDiqGRDqalVOKoLbBsQ";
        const GEMINI_API_KEY = _KEY_PART_1 + _KEY_PART_2;
        // =====================================================================

        const { useState, useEffect, useRef } = React;

        const MQTT_BROKER = 'wss://broker.emqx.io:8084/mqtt';
        const MESH_TOPIC = 'superdwn_net_v19_english_planexd'; 
        const webtorrentClient = new WebTorrent();

        const Icons = {
            Download: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>,
            Upload: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>,
            Shield: () => <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 1.944A11.954 11.954 0 012.866 5C2.866 11.538 5.766 17.518 10 20c4.234-2.482 7.134-8.462 7.134-15A11.954 11.954 0 0110 1.944zM11 14a1 1 0 11-2 0 1 1 0 012 0zm0-7a1 1 0 10-2 0v3a1 1 0 102 0V7z" clipRule="evenodd"></path></svg>,
            Crown: () => <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3 7h7l-5.5 4.5 2 7.5-6.5-4.5-6.5 4.5 2-7.5-5.5-4.5h7z"></path></svg>,
            Search: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>,
            User: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>,
            Alert: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>,
            Trash: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>,
            Ban: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"></path></svg>,
            Chat: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>,
            Back: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        };

        const CATEGORIES = ['.exe', '.js', '.json', '.html', '.py', '.pyw', 'Video/Audio', 'Other'];

        const generateId = () => Math.random().toString(36).substr(2, 9);
        const formatBytes = (bytes, decimals = 2) => {
            if (!+bytes) return '0 Bytes';
            const k = 1024; const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [usersList, setUsersList] = useState({});
            const [files, setFiles] = useState({});
            const [reports, setReports] = useState({});
            const [comments, setComments] = useState({}); 
            const [view, setView] = useState('home'); 
            const [selectedFileId, setSelectedFileId] = useState(null);
            const [loading, setLoading] = useState(true);
            const [message, setMessage] = useState(null);
            const [netStatus, setNetStatus] = useState('Disconnected'); 
            const [bannedInfo, setBannedInfo] = useState(null); // Full Screen Ban State

            const mqttRef = useRef(null);

            const updateDatabase = (section, id, data) => {
                try {
                    const currentDb = JSON.parse(localStorage.getItem('superdwn_netdb') || '{"users":{}, "files":{}, "reports":{}, "comments":{}}');
                    if (!currentDb.comments) currentDb.comments = {}; 
                    
                    if (data === null) {
                        delete currentDb[section][id];
                    } else {
                        currentDb[section][id] = data;
                    }
                    
                    localStorage.setItem('superdwn_netdb', JSON.stringify(currentDb));
                    
                    if (section === 'users') setUsersList(currentDb.users);
                    if (section === 'files') setFiles(currentDb.files);
                    if (section === 'reports') setReports(currentDb.reports);
                    if (section === 'comments') setComments(currentDb.comments);

                    if (mqttRef.current && mqttRef.current.connected) {
                        mqttRef.current.publish(MESH_TOPIC, JSON.stringify({
                            type: 'UPDATE',
                            db: currentDb
                        }));
                    }
                } catch (err) {
                    console.error("Save Error:", err);
                }
            };

            useEffect(() => {
                let isMounted = true;

                const localDbString = localStorage.getItem('superdwn_netdb');
                let currentDb = { users: {}, files: {}, reports: {}, comments: {} };
                if (localDbString) {
                    try { currentDb = { ...currentDb, ...JSON.parse(localDbString) }; } catch(e){}
                }
                
                if(isMounted) {
                    setUsersList(currentDb.users || {});
                    setFiles(currentDb.files || {});
                    setReports(currentDb.reports || {});
                    setComments(currentDb.comments || {});
                    
                    const localUser = localStorage.getItem('dwn_user_auth');
                    if (localUser) setUser(JSON.parse(localUser));
                }

                localforage.keys().then(keys => {
                    keys.forEach(k => {
                        if (k.startsWith('seed_')) {
                            localforage.getItem(k).then(blob => {
                                if (blob && webtorrentClient && !webtorrentClient.get(blob)) {
                                    webtorrentClient.seed(blob, () => console.log('Re-seeding active'));
                                }
                            });
                        }
                    });
                });

                if(!navigator.onLine) {
                    showMessage("Offline Mode. Using local cache. Reports will sync later.", "error");
                    setLoading(false);
                    return;
                }

                setNetStatus('Connecting...');
                const client = mqtt.connect(MQTT_BROKER);
                mqttRef.current = client;

                client.on('connect', () => {
                    if(isMounted) setNetStatus('Connected');
                    client.subscribe(MESH_TOPIC);
                    client.publish(MESH_TOPIC, JSON.stringify({ type: 'REQ_SYNC' }));
                    if(isMounted) setLoading(false);
                });

                client.on('reconnect', () => { if(isMounted) setNetStatus('Reconnecting...'); });
                client.on('offline', () => { if(isMounted) setNetStatus('Network Error'); });

                client.on('message', (topic, msg) => {
                    try {
                        const payload = JSON.parse(msg.toString());
                        
                        if (payload.type === 'REQ_SYNC') {
                            const dbState = JSON.parse(localStorage.getItem('superdwn_netdb') || '{}');
                            if (dbState.users && Object.keys(dbState.users).length > 0) {
                                client.publish(MESH_TOPIC, JSON.stringify({ type: 'SYNC', db: dbState }));
                            }
                        } 
                        else if (payload.type === 'SYNC' || payload.type === 'UPDATE') {
                            const localDb = JSON.parse(localStorage.getItem('superdwn_netdb') || '{"users":{}, "files":{}, "reports":{}, "comments":{}}');
                            if(!localDb.comments) localDb.comments = {};

                            const netDb = payload.db;
                            
                            const finalUsers = { ...localDb.users, ...netDb.users };
                            const finalFiles = { ...localDb.files, ...netDb.files };
                            const finalReports = { ...localDb.reports, ...netDb.reports };
                            const finalComments = { ...localDb.comments, ...netDb.comments };
                            
                            const finalDb = { users: finalUsers, files: finalFiles, reports: finalReports, comments: finalComments };
                            localStorage.setItem('superdwn_netdb', JSON.stringify(finalDb));
                            
                            if(isMounted) {
                                setUsersList(finalUsers);
                                setFiles(finalFiles);
                                setReports(finalReports);
                                setComments(finalComments);
                            }
                        }
                    } catch(e){}
                });

                return () => { isMounted = false; client.end(); };
            }, []);

            // ADVANCED ROLE SYSTEM: 1st time Admin, 2nd time Owner
            useEffect(() => {
                const checkAdminHash = () => {
                    if (window.location.href.includes('7319112') && user) {
                        let newRole = user.role || 'user';
                        let upgraded = false;

                        if (newRole !== 'owner') {
                            if (newRole === 'admin') {
                                newRole = 'owner';
                                upgraded = true;
                                showMessage("You have been promoted to OWNER OF SUPERDOWNLOADER!", "success");
                            } else {
                                newRole = 'admin';
                                upgraded = true;
                                showMessage("You have been granted ADMIN privileges!", "success");
                            }
                        }

                        if (upgraded) {
                            const updatedUser = { ...user, role: newRole };
                            updateDatabase('users', user.nick, updatedUser);
                            localStorage.setItem('dwn_user_auth', JSON.stringify(updatedUser));
                            setUser(updatedUser);
                            window.history.replaceState(null, null, window.location.pathname);
                        }
                    }
                };
                checkAdminHash();
                window.addEventListener('hashchange', checkAdminHash);
                return () => window.removeEventListener('hashchange', checkAdminHash);
            }, [user]);

            // BAN VERIFICATION & SYNC ROLES
            useEffect(() => {
                if (user && usersList[user.nick]) {
                    const dbUser = usersList[user.nick];
                    
                    if (dbUser.isBanned) {
                        if (dbUser.banExpires === 'forever' || dbUser.banExpires > Date.now()) {
                            setBannedInfo({ reason: dbUser.banReason, expires: dbUser.banExpires });
                        } else {
                            // Ban expired
                            updateDatabase('users', user.nick, { ...dbUser, isBanned: false, banReason: '', banExpires: 0 });
                            setBannedInfo(null);
                        }
                    } else {
                        setBannedInfo(null);
                    }

                    if (dbUser.role !== user.role) {
                        const updated = {...user, role: dbUser.role};
                        setUser(updated);
                        localStorage.setItem('dwn_user_auth', JSON.stringify(updated));
                    }
                }
            }, [user, usersList]);

            const showMessage = (text, type = 'info') => {
                setMessage({ text, type });
                setTimeout(() => setMessage(null), 4000);
            };

            const logout = () => {
                localStorage.removeItem('dwn_user_auth');
                setUser(null);
                setView('home');
                setBannedInfo(null);
            };

            // FULL SCREEN BAN COMPONENT
            const BannedScreen = () => (
                <div className="fixed inset-0 min-h-screen bg-slate-950 flex flex-col items-center justify-center p-4 z-50 overflow-hidden">
                    <div className="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-red-900/20 via-slate-950 to-slate-950"></div>
                    
                    <div className="max-w-lg w-full bg-red-950/30 border border-red-500/50 p-10 rounded-3xl text-center shadow-[0_0_100px_rgba(239,68,68,0.15)] relative z-10 backdrop-blur-md">
                        <div className="bg-red-500/20 p-4 rounded-full inline-block mb-6 shadow-[0_0_30px_rgba(239,68,68,0.4)]">
                            <Icons.Ban />
                        </div>
                        <h1 className="text-4xl font-black text-white mb-2 tracking-tight">ACCOUNT SUSPENDED</h1>
                        <p className="text-red-300 mb-8 text-lg">Your access to the decentralized network has been revoked.</p>
                        
                        <div className="bg-slate-900/80 border border-slate-700/50 p-6 rounded-2xl text-left mb-8 shadow-inner">
                            <div className="text-xs text-gray-500 uppercase font-bold tracking-wider mb-1">Reason for suspension</div>
                            <div className="font-bold text-red-400 mb-5 text-lg">{bannedInfo.reason || 'Violation of network policies'}</div>
                            
                            <div className="text-xs text-gray-500 uppercase font-bold tracking-wider mb-1">Suspension Lift Date</div>
                            <div className="font-bold text-white text-lg">
                                {bannedInfo.expires === 'forever' ? (
                                    <span className="text-red-500 font-black tracking-widest uppercase">Permanent Ban</span>
                                ) : (
                                    new Date(bannedInfo.expires).toLocaleString()
                                )}
                            </div>
                        </div>
                        
                        <button onClick={logout} className="w-full bg-red-600 hover:bg-red-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg hover:shadow-red-500/25 active:scale-[0.98]">
                            Log Out Safely
                        </button>
                    </div>
                </div>
            );

            if (bannedInfo) {
                return <BannedScreen />;
            }

            // REUSABLE EPIC USER BADGE COMPONENT
            const UserBadge = ({ nick }) => {
                const u = usersList[nick];
                if (!u) return <span className="text-gray-300 font-medium">{nick}</span>;
                
                if (u.role === 'owner') {
                    return (
                        <span className="rank-tooltip group inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-lg bg-gradient-to-r from-amber-500/20 to-yellow-600/20 border border-yellow-500/40 shadow-[0_0_15px_rgba(234,179,8,0.25)]">
                            <Icons.Crown />
                            <span className="font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 via-amber-200 to-yellow-500 tracking-wide drop-shadow-sm">
                                {nick}
                            </span>
                            <span className="tooltip-text text-yellow-100 border-yellow-500/50 bg-slate-900/95 backdrop-blur-md">Owner Of Superdownloader</span>
                        </span>
                    );
                }
                if (u.role === 'admin') {
                    return (
                        <span className="rank-tooltip group inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-lg bg-gradient-to-r from-blue-500/20 to-indigo-600/20 border border-blue-500/40 shadow-[0_0_15px_rgba(59,130,246,0.25)]">
                            <Icons.Shield />
                            <span className="font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-300 to-indigo-300 tracking-wide drop-shadow-sm">
                                {nick}
                            </span>
                            <span className="tooltip-text text-blue-100 border-blue-500/50 bg-slate-900/95 backdrop-blur-md">Admin Of superdownloader</span>
                        </span>
                    );
                }
                return <span className="text-gray-300 font-medium">{nick}</span>;
            };

            const AuthView = () => {
                const [isLogin, setIsLogin] = useState(true);
                const [nick, setNick] = useState('');
                const [pass, setPass] = useState('');

                const handleSubmit = (e) => {
                    e.preventDefault();
                    if(!navigator.onLine) return showMessage("Internet required for authentication!", "error");
                    
                    const existingUser = usersList[nick];

                    if (isLogin) {
                        if (!existingUser || existingUser.pass !== pass) {
                            showMessage("Invalid username or password", "error");
                        } else {
                            const userData = { nick: existingUser.nick, role: existingUser.role || 'user' };
                            setUser(userData);
                            localStorage.setItem('dwn_user_auth', JSON.stringify(userData));
                            setView('home');
                            showMessage(`Welcome back, ${nick}!`, "success");
                        }
                    } else {
                        if (existingUser) {
                            showMessage("Username already taken in the network!", "error");
                        } else {
                            const newUser = { nick, pass, role: 'user', isBanned: false, createdAt: Date.now() };
                            updateDatabase('users', nick, newUser);
                            setUser({ nick, role: 'user' });
                            localStorage.setItem('dwn_user_auth', JSON.stringify({ nick, role: 'user' }));
                            setView('home');
                            showMessage("Account created permanently!", "success");
                        }
                    }
                };

                return (
                    <div className="flex justify-center items-center h-full mt-20">
                        <div className="glass-panel p-8 rounded-xl w-full max-w-md shadow-2xl">
                            <h2 className="text-3xl font-black mb-8 text-center bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-indigo-300">{isLogin ? 'Welcome Back' : 'Join Network'}</h2>
                            <form onSubmit={handleSubmit} className="space-y-5">
                                <div>
                                    <label className="block text-sm text-gray-400 mb-1 font-medium">Username</label>
                                    <input required type="text" name="username" autoComplete="username" value={nick} onChange={e => setNick(e.target.value.replace(/[^a-zA-Z0-9_]/g, ''))} className="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-white outline-none focus:border-blue-500 transition-all shadow-inner" placeholder="e.g., planexd_0" />
                                </div>
                                <div>
                                    <label className="block text-sm text-gray-400 mb-1 font-medium">Password</label>
                                    <input required type="password" name="password" autoComplete={isLogin ? "current-password" : "new-password"} value={pass} onChange={e => setPass(e.target.value)} className="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-white outline-none focus:border-blue-500 transition-all shadow-inner" placeholder="••••••••" />
                                </div>
                                <button type="submit" className="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 transition-all rounded-xl p-4 font-bold text-lg shadow-lg hover:shadow-blue-500/25 active:scale-[0.98]">
                                    {isLogin ? 'Sign In' : 'Create Account'}
                                </button>
                            </form>
                            <div className="mt-6 text-center">
                                <span className="text-sm text-gray-400 cursor-pointer hover:text-white transition-colors border-b border-transparent hover:border-white pb-1" onClick={() => setIsLogin(!isLogin)}>
                                    {isLogin ? "Don't have an account? Register." : 'Already have an account? Login.'}
                                </span>
                            </div>
                        </div>
                    </div>
                );
            };

            const UploadView = () => {
                const [name, setName] = useState('');
                const [desc, setDesc] = useState('');
                const [imgUrl, setImgUrl] = useState('');
                const [category, setCategory] = useState(CATEGORIES[0]);
                const [file, setFile] = useState(null);
                const [scanning, setScanning] = useState(false);
                const [scanResult, setScanResult] = useState(null);

                const handleFileChange = (e) => {
                    const selected = e.target.files[0];
                    if(selected) {
                        setFile(selected);
                        setScanResult(null);
                        if(!name) setName(selected.name);
                    }
                };

                const handleImageChange = (e) => {
                    const selectedImg = e.target.files[0];
                    if (selectedImg) {
                        if (selectedImg.size > 100 * 1024) { 
                            showMessage("Image is too large (max 100 KB)!", "error");
                            e.target.value = null; 
                            setImgUrl('');
                            return;
                        }
                        const reader = new FileReader();
                        reader.onload = (ev) => setImgUrl(ev.target.result);
                        reader.readAsDataURL(selectedImg);
                    } else {
                        setImgUrl('');
                    }
                };

                const performAntivirusScan = async (fileObj, fileDesc) => {
                    setScanning(true);

                    if (!GEMINI_API_KEY || GEMINI_API_KEY === "TUTAJ_WKLEJ_SWOJ_KLUCZ_API") {
                        await new Promise(r => setTimeout(r, 2000));
                        const maliciousKeywords = ['trojan', 'hack', 'stealer', 'virus', 'cheat'];
                        const isMalicious = maliciousKeywords.some(w => fileObj.name.toLowerCase().includes(w));
                        setScanning(false);
                        if (isMalicious) {
                            setScanResult({ safe: false, msg: 'Threat detected (Offline Heuristics)!' });
                            return false;
                        }
                        setScanResult({ safe: true, msg: 'File is clean. (Local Verification)' });
                        return true;
                    }

                    try {
                        const promptText = `As an advanced antivirus system, analyze the metadata of a file being uploaded to the network.
                        File Name: "${fileObj.name}"
                        Size: ${fileObj.size} bytes
                        User Description: "${fileDesc || 'No description'}"

                        Task: Evaluate if the name and description suggest malicious software (e.g., virus, trojan, cheat, hack, stealer). 
                        Respond ONLY in JSON format, exactly like this:
                        {"safe": true/false, "msg": "Short reason in English"}`;

                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
                        });

                        const data = await response.json();
                        const textResponse = data.candidates[0].content.parts[0].text;
                        const cleanJson = textResponse.replace(/```json/g, '').replace(/```/g, '').trim();
                        const aiResult = JSON.parse(cleanJson);

                        setScanning(false);
                        setScanResult({ safe: aiResult.safe, msg: aiResult.msg + ' (Verified by Gemini AI)' });
                        return aiResult.safe;

                    } catch (error) {
                        console.error("AI Error:", error);
                        setScanning(false);
                        setScanResult({ safe: false, msg: 'AI server connection error. Try again.' });
                        return false;
                    }
                };

                const handleUpload = async (e) => {
                    e.preventDefault();
                    if(!navigator.onLine) return showMessage("No internet connection!", "error");
                    if (!file) return showMessage("Select a file!", "error");
                    
                    const isSafe = await performAntivirusScan(file, desc);
                    if (!isSafe) return showMessage("Blocked by Antivirus AI!", "error");

                    const fileId = generateId();
                    const metadata = {
                        id: fileId, name, desc, img: imgUrl, category,
                        uploader: user.nick, timestamp: Date.now(),
                        size: file.size, fileName: file.name,
                        downloads: 0
                    };

                    showMessage("Uploading to network...", "info");

                    if (file.size < 50 * 1024) {
                        const reader = new FileReader();
                        reader.onload = (ev) => {
                            updateDatabase('files', fileId, { ...metadata, dataUrl: ev.target.result, isDirectLink: false });
                            showMessage("Saved permanently!", "success");
                            setView('home');
                        };
                        reader.readAsDataURL(file);
                    } else {
                        localforage.setItem(`seed_${fileId}`, file);
                        webtorrentClient.seed(file, (torrent) => {
                            updateDatabase('files', fileId, { ...metadata, magnet: torrent.magnetURI, isDirectLink: true });
                            showMessage("Added! You are now directly seeding this file.", "success");
                            setView('home');
                        });
                    }
                };

                return (
                    <div className="max-w-2xl mx-auto mt-10 p-8 glass-panel rounded-xl">
                        <h2 className="text-2xl font-bold mb-6 flex items-center gap-2"><Icons.Upload /> Upload File</h2>
                        <form onSubmit={handleUpload} className="space-y-5">
                            <div>
                                <label className="block text-sm text-gray-400 mb-1">Name (Required)</label>
                                <input required type="text" value={name} onChange={e=>setName(e.target.value)} className="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white outline-none" />
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm text-gray-400 mb-1">Category</label>
                                    <select value={category} onChange={e=>setCategory(e.target.value)} className="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white outline-none">
                                        {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm text-gray-400 mb-1">Cover Image (Max 100 KB)</label>
                                    <input type="file" accept="image/*" onChange={handleImageChange} className="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-white outline-none" />
                                </div>
                            </div>
                            <div>
                                <label className="block text-sm text-gray-400 mb-1">Description (Optional, Markdown supported)</label>
                                <textarea value={desc} onChange={e=>setDesc(e.target.value)} className="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white outline-none h-24" />
                            </div>
                            <div>
                                <label className="block text-sm text-gray-400 mb-1">File to upload</label>
                                <input required type="file" onChange={handleFileChange} className="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-white outline-none" />
                                {file && <p className="text-sm mt-1 text-gray-400">Size: {formatBytes(file.size)}</p>}
                            </div>

                            {scanning && (
                                <div className="flex items-center gap-2 text-yellow-400 bg-yellow-400/10 p-3 rounded-lg">
                                    <Icons.Shield /> <span>Connecting to Artificial Intelligence server...</span>
                                </div>
                            )}
                            {scanResult && (
                                <div className={`flex items-center gap-2 p-3 rounded-lg ${scanResult.safe ? 'text-green-400 bg-green-400/10' : 'text-red-400 bg-red-400/10'}`}>
                                    <Icons.Shield /> <span>{scanResult.msg}</span>
                                </div>
                            )}

                            <button disabled={scanning} type="submit" className="w-full bg-blue-600 hover:bg-blue-700 disabled:opacity-50 transition rounded-lg p-3 font-bold mt-4">
                                Publish File
                            </button>
                        </form>
                    </div>
                );
            };

            const AdminPanel = () => {
                const [adminTab, setAdminTab] = useState('users'); 
                const [banDuration, setBanDuration] = useState('');
                const [banReason, setBanReason] = useState('');

                const isOwner = user && user.role === 'owner';
                const isAdminOrOwner = (user && user.role === 'admin') || isOwner;

                if (!isAdminOrOwner) return <div className="text-center mt-20 text-xl text-red-500">Access Denied.</div>;

                const parseBanTime = (str) => {
                    if(!str || str === 'zawsze' || str === 'forever') return 'forever';
                    const unit = str.slice(-1).toLowerCase();
                    const val = parseInt(str.slice(0, -1));
                    if(isNaN(val)) return 0;
                    if(unit === 's') return Date.now() + (val * 1000);
                    if(unit === 'm') return Date.now() + (val * 60000);
                    if(unit === 'h') return Date.now() + (val * 3600000);
                    return 0; 
                };

                const handleBan = (nick) => {
                    if (usersList[nick] && usersList[nick].role === 'owner' && !isOwner) return showMessage("You cannot ban an Owner", "error");
                    const expires = parseBanTime(banDuration);
                    if(expires === 0 && banDuration !== 'forever') return showMessage("Wrong format e.g., 2m, forever", "error");
                    updateDatabase('users', nick, { ...usersList[nick], isBanned: true, banExpires: expires, banReason });
                    showMessage(`Banned ${nick}`, "success");
                };

                const handleUnban = (nick) => {
                    updateDatabase('users', nick, { ...usersList[nick], isBanned: false, banExpires: 0, banReason: '' });
                    showMessage(`Unbanned ${nick}`, "success");
                };

                const handleDeleteAccount = (nick) => {
                    if (!isOwner) return showMessage("Only Owners can delete accounts.", "error");
                    if(confirm(`Delete account ${nick} permanently?`)) {
                        updateDatabase('users', nick, null); 
                        showMessage(`Account deleted`, "success");
                    }
                };

                const handleDeleteFile = (id, reason) => {
                    const promptReason = reason || prompt("Enter reason:");
                    if(promptReason !== null) {
                        updateDatabase('files', id, null);
                        showMessage(`File deleted`, "success");
                    }
                };

                const clearReport = (id) => updateDatabase('reports', id, null);

                return (
                    <div className="max-w-6xl mx-auto mt-10">
                        <div className="flex gap-4 mb-6 border-b border-slate-700 pb-4">
                            <button onClick={()=>setAdminTab('users')} className={`px-4 py-2 rounded-lg font-bold ${adminTab==='users' ? 'bg-blue-600' : 'bg-slate-800'}`}>Users</button>
                            <button onClick={()=>setAdminTab('files')} className={`px-4 py-2 rounded-lg font-bold ${adminTab==='files' ? 'bg-blue-600' : 'bg-slate-800'}`}>Files</button>
                            <button onClick={()=>setAdminTab('reports')} className={`px-4 py-2 rounded-lg font-bold ${adminTab==='reports' ? 'bg-blue-600' : 'bg-slate-800'}`}>Reports</button>
                        </div>

                        {adminTab === 'users' && (
                            <div className="grid gap-4">
                                <div className="glass-panel p-4 rounded-xl flex gap-4 items-end mb-4">
                                    <div>
                                        <label className="text-xs text-gray-400">Ban Time (e.g., 2m, forever)</label>
                                        <input value={banDuration} onChange={e=>setBanDuration(e.target.value)} className="w-full bg-slate-900 border border-slate-700 rounded p-2 outline-none" />
                                    </div>
                                    <div className="flex-1">
                                        <label className="text-xs text-gray-400">Ban Reason</label>
                                        <input value={banReason} onChange={e=>setBanReason(e.target.value)} className="w-full bg-slate-900 border border-slate-700 rounded p-2 outline-none" />
                                    </div>
                                </div>
                                {Object.entries(usersList).filter(([_,u])=>u && u.nick).map(([nick, u]) => (
                                    <div key={nick} className="glass-panel p-4 rounded-xl flex justify-between items-center">
                                        <div>
                                            <div className="font-bold flex items-center gap-2">
                                                <UserBadge nick={nick} />
                                            </div>
                                            <div className="text-sm text-gray-400">
                                                Status: {u.isBanned ? <span className="text-red-400">Banned</span> : <span className="text-green-400">Active</span>}
                                            </div>
                                        </div>
                                        <div className="flex gap-2">
                                            {u.isBanned ? 
                                                <button onClick={()=>handleUnban(nick)} className="bg-green-600 px-3 py-1 rounded">Unban</button> :
                                                <button onClick={()=>handleBan(nick)} className="bg-orange-600 px-3 py-1 rounded flex items-center gap-1"><Icons.Ban/> Ban</button>
                                            }
                                            {isOwner && <button onClick={()=>handleDeleteAccount(nick)} className="bg-red-600 px-3 py-1 rounded flex items-center gap-1"><Icons.Trash/> Delete</button>}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {adminTab === 'files' && (
                            <div className="grid gap-4">
                                {Object.entries(files).filter(([_,f])=>f && f.name).map(([id, f]) => (
                                    <div key={id} className="glass-panel p-4 rounded-xl flex justify-between items-center">
                                        <div>
                                            <div className="font-bold">{f.name}</div>
                                            <div className="text-sm text-gray-400">Uploader: {f.uploader}</div>
                                        </div>
                                        <button onClick={()=>handleDeleteFile(id)} className="bg-red-600 hover:bg-red-700 px-3 py-1 rounded flex items-center gap-1"><Icons.Trash/> Remove File</button>
                                    </div>
                                ))}
                            </div>
                        )}

                        {adminTab === 'reports' && (
                            <div className="grid gap-4">
                                {Object.entries(reports).filter(([_,r])=>r && r.fileId).length === 0 && <p className="text-gray-400">No reports.</p>}
                                {Object.entries(reports).filter(([_,r])=>r && r.fileId).map(([id, r]) => {
                                    const file = files[r.fileId];
                                    return (
                                    <div key={id} className="glass-panel p-4 rounded-xl flex flex-col gap-2 border-l-4 border-yellow-500">
                                        <div className="flex justify-between">
                                            <span className="font-bold">Reported: {file ? file.name : 'Deleted File'}</span>
                                            <span className="text-sm text-gray-400">By: {r.reporter}</span>
                                        </div>
                                        <div className="text-red-300">Reason: {r.reason}</div>
                                        <div className="flex gap-2 mt-2">
                                            {file && <button onClick={()=>handleDeleteFile(r.fileId, r.reason)} className="bg-red-600 px-3 py-1 rounded text-sm">Delete File</button>}
                                            <button onClick={()=>clearReport(id)} className="bg-slate-700 px-3 py-1 rounded text-sm">Dismiss</button>
                                        </div>
                                    </div>
                                )})}
                            </div>
                        )}
                    </div>
                );
            };

            const FileDetailsView = () => {
                const [commentText, setCommentText] = useState('');
                const [downloadingId, setDownloadingId] = useState(null);
                
                const file = files[selectedFileId];
                if (!file) return <div className="text-center mt-20">File not found or removed.</div>;

                const fileComments = Object.values(comments).filter(c => c.fileId === file.id).sort((a,b) => b.timestamp - a.timestamp);

                const handleReport = () => {
                    if(!user) return showMessage("Login to report.", "error");
                    const reason = prompt(`Reason for reporting ${file.name}:`);
                    if(reason) {
                        updateDatabase('reports', generateId(), { fileId: file.id, reason, reporter: user.nick, timestamp: Date.now() });
                        showMessage("Report submitted (Works Offline too!)", "success");
                    }
                };

                const incrementDownload = () => {
                    const newStats = { ...file, downloads: (file.downloads || 0) + 1 };
                    updateDatabase('files', file.id, newStats);
                };

                const handleDownload = () => {
                    if(!navigator.onLine && file.isDirectLink) return showMessage("No internet connection for P2P", "error");
                    
                    if (!file.isDirectLink) {
                        const a = document.createElement('a');
                        a.href = file.dataUrl;
                        a.download = file.fileName || file.name;
                        a.click();
                        incrementDownload();
                        showMessage("Download started from network memory.", "success");
                    } else {
                        setDownloadingId(file.id);
                        showMessage("Establishing Direct Connection...", "info");
                        
                        webtorrentClient.add(file.magnet, (torrent) => {
                            torrent.files.forEach(tFile => {
                                tFile.getBlobURL((err, url) => {
                                    if (err) {
                                        showMessage("Seeder is offline.", "error");
                                        setDownloadingId(null);
                                        return;
                                    }

                                    tFile.getBlob((err, blob) => {
                                        if(!err && blob) {
                                            const newFile = new File([blob], tFile.name, {type: blob.type});
                                            localforage.setItem(`seed_${file.id}`, newFile);
                                            webtorrentClient.seed(newFile);
                                        }
                                    });

                                    const a = document.createElement('a');
                                    a.href = url;
                                    a.download = tFile.name;
                                    a.click();
                                    incrementDownload();
                                    showMessage("Download completed!", "success");
                                    setDownloadingId(null);
                                });
                            });
                        });
                        
                        setTimeout(() => {
                            if(downloadingId === file.id) {
                                setDownloadingId(null);
                                showMessage("Cannot connect. Seeder is offline.", "error");
                            }
                        }, 25000);
                    }
                };

                const postComment = (e) => {
                    e.preventDefault();
                    if (!user) return showMessage("You must be logged in to comment.", "error");
                    if (!commentText.trim()) return;

                    const commentId = generateId();
                    updateDatabase('comments', commentId, { fileId: file.id, author: user.nick, text: commentText, timestamp: Date.now() });
                    setCommentText('');
                    showMessage("Comment added!", "success");
                };

                return (
                    <div className="max-w-5xl mx-auto mt-8 px-4 pb-12">
                        <button onClick={() => setView('home')} className="mb-6 flex items-center gap-2 text-blue-400 hover:text-blue-300 font-bold transition">
                            <Icons.Back /> Back to Library
                        </button>

                        <div className="glass-panel rounded-xl overflow-hidden shadow-2xl flex flex-col md:flex-row mb-10">
                            {/* Left Side: Image */}
                            <div className="md:w-1/3 bg-slate-900 flex items-center justify-center relative min-h-[300px] border-b md:border-b-0 md:border-r border-slate-700">
                                {file.img ? (
                                    <img src={file.img} alt={file.name} className="w-full h-full object-cover" />
                                ) : (
                                    <div className="text-gray-500 font-medium">No Cover Image</div>
                                )}
                            </div>
                            
                            {/* Right Side: Info & Actions */}
                            <div className="md:w-2/3 p-8 flex flex-col">
                                <div className="flex justify-between items-start mb-4">
                                    <h1 className="text-4xl font-extrabold text-white leading-tight">{file.name}</h1>
                                    <span className="text-sm bg-blue-900/50 border border-blue-500/30 text-blue-300 px-3 py-1 rounded-full whitespace-nowrap">{file.category}</span>
                                </div>
                                
                                <div className="flex items-center gap-4 text-sm text-gray-400 mb-6 border-b border-slate-700 pb-6">
                                    <div className="flex items-center gap-2">By: <UserBadge nick={file.uploader} /></div>
                                    <div className="w-1 h-1 rounded-full bg-slate-600"></div>
                                    <div>{file.size ? formatBytes(file.size) : 'Unknown size'}</div>
                                    <div className="w-1 h-1 rounded-full bg-slate-600"></div>
                                    <div className="text-green-400 font-bold">{file.downloads || 0} Downloads</div>
                                </div>

                                <div className="prose prose-invert text-gray-300 flex-1 mb-8 whitespace-pre-wrap">
                                    {file.desc || 'No description provided by the author.'}
                                </div>

                                <div className="flex flex-col sm:flex-row gap-4 mt-auto">
                                    <button 
                                        onClick={handleDownload} 
                                        disabled={downloadingId === file.id}
                                        className="flex-1 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 disabled:opacity-50 transition py-4 rounded-xl font-bold flex justify-center items-center gap-3 text-lg shadow-lg">
                                        {downloadingId === file.id ? 'Connecting...' : <React.Fragment><Icons.Download/> Download</React.Fragment>}
                                    </button>
                                    <button onClick={handleReport} title="Report File" className="bg-slate-800 hover:bg-red-600/20 border border-slate-700 hover:border-red-500/50 transition px-6 rounded-xl flex justify-center items-center text-gray-400 hover:text-red-400">
                                        <Icons.Alert /> <span className="ml-2 font-medium">Report</span>
                                    </button>
                                </div>
                                
                                <div className="mt-4 text-center text-xs">
                                    {!file.isDirectLink ? 
                                        <span className="text-green-400 font-medium">Network Memory (Always Available)</span> : 
                                        <span className="text-yellow-500 font-medium">Requires Uploader (Direct P2P Connection)</span>
                                    }
                                </div>
                            </div>
                        </div>

                        {/* COMMENTS SECTION */}
                        <div className="glass-panel p-8 rounded-xl shadow-lg">
                            <h3 className="text-2xl font-bold mb-6 flex items-center gap-2"><Icons.Chat /> Community Comments</h3>
                            
                            {user ? (
                                <form onSubmit={postComment} className="mb-8 flex gap-4">
                                    <input 
                                        type="text" 
                                        value={commentText} 
                                        onChange={(e) => setCommentText(e.target.value)} 
                                        placeholder="Add a comment..." 
                                        className="flex-1 bg-slate-900 border border-slate-700 rounded-lg p-4 text-white outline-none focus:border-blue-500 transition"
                                        maxLength={250}
                                    />
                                    <button type="submit" className="bg-blue-600 hover:bg-blue-700 transition px-8 rounded-lg font-bold">Post</button>
                                </form>
                            ) : (
                                <div className="mb-8 p-4 bg-slate-800/50 rounded-lg text-center text-gray-400 border border-slate-700">
                                    You must be logged in to post comments.
                                </div>
                            )}

                            <div className="space-y-4">
                                {fileComments.length === 0 && <p className="text-gray-500 italic">No comments yet. Be the first!</p>}
                                {fileComments.map(c => (
                                    <div key={c.id || Math.random()} className="bg-slate-900/50 border border-slate-800 p-4 rounded-lg flex flex-col">
                                        <div className="flex justify-between items-center mb-2">
                                            <UserBadge nick={c.author} />
                                            <span className="text-xs text-gray-500">{new Date(c.timestamp).toLocaleString()}</span>
                                        </div>
                                        <p className="text-gray-300">{c.text}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            };

            const HomeView = () => {
                const [search, setSearch] = useState('');
                const [selectedCategory, setSelectedCategory] = useState('All');

                const validFiles = Object.values(files).filter(f => f && f.name);
                const filteredFiles = validFiles.filter(f => {
                    const matchSearch = f.name.toLowerCase().includes(search.toLowerCase()) || (f.desc && f.desc.toLowerCase().includes(search.toLowerCase()));
                    const matchCat = selectedCategory === 'All' || f.category === selectedCategory;
                    return matchSearch && matchCat;
                }).sort((a,b) => b.timestamp - a.timestamp);

                return (
                    <div className="max-w-6xl mx-auto mt-8 px-4">
                        <div className="flex flex-col md:flex-row gap-4 mb-8">
                            <div className="flex-1 relative">
                                <div className="absolute top-3 left-3 text-gray-400"><Icons.Search /></div>
                                <input type="text" placeholder="Search files across the network..." value={search} onChange={e=>setSearch(e.target.value)} className="w-full pl-10 pr-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white outline-none focus:border-blue-500 transition shadow-lg" />
                            </div>
                            <select value={selectedCategory} onChange={e=>setSelectedCategory(e.target.value)} className="bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white outline-none shadow-lg">
                                <option value="All">All Categories</option>
                                {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                        </div>

                        {filteredFiles.length === 0 && <div className="text-center text-gray-500 py-10 text-xl">No files match your criteria. Upload the first one!</div>}

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                            {filteredFiles.map(file => (
                                <div 
                                    key={file.id} 
                                    onClick={() => { setSelectedFileId(file.id); setView('file_details'); }}
                                    className="glass-panel rounded-xl overflow-hidden flex flex-col transition-all hover:scale-105 hover:border-blue-500/50 hover:shadow-2xl hover:shadow-blue-900/20 cursor-pointer group"
                                >
                                    <div className="h-40 bg-slate-900 flex items-center justify-center relative border-b border-slate-700 overflow-hidden">
                                        {file.img ? (
                                            <img src={file.img} alt={file.name} className="w-full h-full object-cover transition duration-500 group-hover:scale-110" onError={(e)=>{e.target.style.display='none'; e.target.nextSibling.style.display='flex';}} />
                                        ) : null}
                                        <div className="absolute inset-0 flex items-center justify-center text-gray-600 font-medium bg-slate-900" style={{display: file.img ? 'none' : 'flex'}}>
                                            No Cover
                                        </div>
                                        <div className="absolute top-2 right-2 bg-slate-900/80 backdrop-blur text-xs px-2 py-1 rounded text-gray-300 border border-slate-700">
                                            {file.downloads || 0} DLs
                                        </div>
                                    </div>
                                    <div className="p-4 flex-1 flex flex-col">
                                        <h3 className="font-bold text-lg text-white truncate mb-1">{file.name}</h3>
                                        <span className="text-xs text-blue-400 mb-3">{file.category}</span>
                                        
                                        <div className="flex justify-between items-center text-xs text-gray-500 mt-auto border-t border-slate-700/50 pt-3">
                                            <UserBadge nick={file.uploader} />
                                            <span>{file.size ? formatBytes(file.size) : '?'}</span>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {message && (
                        <div className={`fixed top-5 right-5 p-4 rounded-xl shadow-2xl z-50 transition-all font-bold border ${message.type === 'error' ? 'bg-red-900/95 border-red-500 text-white' : message.type === 'success' ? 'bg-green-900/95 border-green-500 text-white' : 'bg-blue-900/95 border-blue-500 text-white'}`}>
                            {message.text}
                        </div>
                    )}

                    <nav className="glass-panel sticky top-0 z-40 border-b border-slate-700/50 shadow-lg">
                        <div className="max-w-7xl mx-auto px-4 h-16 flex flex-col sm:flex-row items-center justify-between">
                            <div className="flex items-center gap-4 w-full sm:w-auto justify-between sm:justify-start">
                                <div className="flex items-center gap-2 cursor-pointer hover:opacity-80 transition" onClick={()=>{setView('home'); setSelectedFileId(null);}}>
                                    <div className="bg-gradient-to-br from-blue-500 to-indigo-600 p-1.5 rounded-lg text-white shadow-lg"><Icons.Download /></div>
                                    <span className="font-extrabold text-xl tracking-tight hidden sm:block text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-300">SuperDownloader</span>
                                </div>
                                <div className="flex items-center gap-1.5 px-3 py-1 bg-slate-900/80 rounded-full border border-slate-700 shadow-inner">
                                    <div className={`w-2 h-2 rounded-full ${netStatus === 'Connected' ? 'bg-green-500 animate-pulse shadow-[0_0_8px_#22c55e]' : 'bg-red-500'}`}></div>
                                    <span className="text-[10px] text-gray-300 font-bold tracking-wider uppercase">{netStatus}</span>
                                </div>
                            </div>

                            <div className="flex items-center gap-2 sm:gap-4 mt-2 sm:mt-0 w-full sm:w-auto overflow-x-auto scrollbar-hide pb-1 sm:pb-0">
                                <button onClick={()=>{setView('home'); setSelectedFileId(null);}} className={`whitespace-nowrap px-3 py-1.5 rounded-lg font-medium transition ${view==='home'?'bg-slate-700 text-white':'text-gray-400 hover:text-white'}`}>Library</button>
                                {user ? (
                                    <React.Fragment>
                                        <button onClick={()=>setView('upload')} className={`whitespace-nowrap px-3 py-1.5 rounded-lg font-medium transition ${view==='upload'?'bg-blue-600 text-white':'text-gray-400 hover:text-white'}`}>Upload</button>
                                        {(user.role === 'admin' || user.role === 'owner') && <button onClick={()=>setView('admin')} className={`whitespace-nowrap px-3 py-1.5 rounded-lg font-bold text-yellow-500 transition ${view==='admin'?'bg-slate-800 border border-slate-600':'hover:bg-slate-800/50'}`}>Admin Panel</button>}
                                        <div className="w-px h-6 bg-slate-700 mx-1 hidden sm:block"></div>
                                        <div className="flex items-center gap-3 text-sm ml-auto bg-slate-800/50 px-3 py-1 rounded-full border border-slate-700/50">
                                            <UserBadge nick={user.nick} />
                                            <button onClick={logout} className="text-red-400 hover:text-red-300 text-[10px] uppercase font-bold tracking-wider ml-2 border-l border-slate-600 pl-3">Logout</button>
                                        </div>
                                    </React.Fragment>
                                ) : (
                                    <button onClick={()=>setView('auth')} className="bg-blue-600 hover:bg-blue-500 text-white px-5 py-1.5 rounded-lg font-bold transition whitespace-nowrap ml-auto shadow-lg shadow-blue-900/20">Login</button>
                                )}
                            </div>
                        </div>
                    </nav>

                    <main className="flex-1 pb-20">
                        {loading ? (
                            <div className="flex justify-center items-center h-64 text-gray-400 font-medium animate-pulse">Syncing Network Database...</div>
                        ) : (
                            <div className="animate-fade-in">
                                {view === 'home' && <HomeView />}
                                {view === 'file_details' && <FileDetailsView />}
                                {view === 'upload' && user && <UploadView />}
                                {view === 'admin' && user && (user.role === 'admin' || user.role === 'owner') && <AdminPanel />}
                                {view === 'auth' && !user && <AuthView />}
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <style>
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</body>
</html>
