<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superdownloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }
        .play-green { color: #01875f; }
        .bg-play-green { background-color: #01875f; }
        .hover-bg-play-green:hover { background-color: #00704f; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
        
        /* Modal Animation */
        .modal-enter { animation: modalFadeIn 0.3s ease-out forwards; }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95) translateY(-10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body class="text-gray-800 flex flex-col min-h-screen">

    <!-- Top Navigation -->
    <header class="bg-white shadow-sm sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <!-- Logo -->
            <div class="flex items-center gap-2 cursor-pointer" onclick="navigate('home')">
                <i class="fa-brands fa-google-play text-2xl play-green"></i>
                <span class="text-xl font-semibold hidden sm:block">Superdownloader</span>
            </div>

            <!-- Search Bar -->
            <div class="flex-1 max-w-2xl px-4 ml-4">
                <div class="relative">
                    <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="searchInput" placeholder="Search for apps & games..." 
                        class="w-full pl-10 pr-4 py-2 bg-gray-100 rounded-full focus:outline-none focus:ring-2 focus:ring-[#01875f] focus:bg-white transition-colors"
                        onkeypress="if(event.key === 'Enter') performSearch()">
                </div>
            </div>

            <!-- User Menu -->
            <div class="flex items-center gap-4 ml-4" id="navAuthSection">
                <!-- Dynamically populated via JS -->
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="app" class="flex-1 max-w-7xl mx-auto w-full px-4 py-6">
        <!-- Views will be rendered here -->
    </main>

    <!-- Modal Container -->
    <div id="modalOverlay" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center p-4">
        <div id="modalContent" class="bg-white rounded-xl shadow-2xl max-w-md w-full overflow-hidden">
            <!-- Modal Content Injected Here -->
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toastContainer" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <!-- MAIN SCRIPT LOGIC -->
    <script>
        const DB_KEY = 'superdownloader_db_v2';
        let db = {
            users: [], // { id, username, password, role, isBanned, ipBanned, joinDate, ipToken }
            apps: [], // { id, name, shortDesc, desc, devId, version, size, img, downloads, rating, verified, educational, badges, ageRating, isDeleted, timestamp }
            reviews: [], // { id, appId, userId, rating, text, helpfulVotes, timestamp }
            reports: [], // { id, type, targetId, reporterId, reason, status }
            deviceIpToken: ''
        };

        let currentUser = null;
        let fileDB = null;
        let uploadState = { metadata: {}, fileData: null, rawFile: null };

        // 1. IndexedDB Initialization for heavy APK files
        function initFileDB() {
            return new Promise((resolve) => {
                const req = indexedDB.open('SuperdownloaderFiles', 1);
                req.onupgradeneeded = (e) => {
                    e.target.result.createObjectStore('apks');
                };
                req.onsuccess = (e) => {
                    fileDB = e.target.result;
                    resolve();
                };
                req.onerror = () => {
                    console.error("IndexedDB failed to initialize. Heavy files won't be saved locally.");
                    resolve();
                };
            });
        }

        function saveFileToDB(appId, fileBlob) {
            return new Promise((resolve) => {
                if(!fileDB) return resolve();
                const tx = fileDB.transaction('apks', 'readwrite');
                tx.objectStore('apks').put(fileBlob, appId);
                tx.oncomplete = resolve;
            });
        }

        function getFileFromDB(appId) {
            return new Promise((resolve) => {
                if(!fileDB) return resolve(null);
                const tx = fileDB.transaction('apks', 'readonly');
                const req = tx.objectStore('apks').get(appId);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => resolve(null);
            });
        }

        // 2. LocalStorage & Init
        function initDb() {
            const stored = localStorage.getItem(DB_KEY);
            if(stored) {
                db = JSON.parse(stored);
            } else {
                db.deviceIpToken = 'IP_' + Math.random().toString(36).substr(2, 9);
                saveDb();
            }

            const storedUser = localStorage.getItem('superdownloader_user');
            if(storedUser) {
                const u = JSON.parse(storedUser);
                const freshUser = db.users.find(x => x.id === u.id);
                if(freshUser && !freshUser.isBanned && !checkIfIpBanned(freshUser.ipToken)) {
                    currentUser = freshUser;
                } else {
                    logout(false);
                }
            }
            
            checkAdminHash();
            renderTopNav();
        }

        function saveDb() {
            localStorage.setItem(DB_KEY, JSON.stringify(db));
            if(currentUser) {
                // Update active user data in case of role change etc
                localStorage.setItem('superdownloader_user', JSON.stringify(currentUser));
            }
        }

        function generateId() {
            return Math.random().toString(36).substr(2, 9) + Date.now();
        }

        function checkIfIpBanned(ipToken) {
            return db.users.some(u => u.ipToken === ipToken && u.ipBanned);
        }

        // Check for Admin Hash (#7319112)
        function checkAdminHash() {
            if(window.location.hash === '#7319112' && currentUser) {
                currentUser.role = 'admin';
                saveDb();
                showToast('Admin access granted!', 'success');
                window.location.hash = ''; // clear hash
                renderTopNav();
            }
        }
        window.addEventListener('hashchange', checkAdminHash);

        // UI Helpers
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            let bgColor = 'bg-gray-800';
            let icon = 'fa-info-circle';
            
            if(type === 'success') { bgColor = 'bg-green-600'; icon = 'fa-check-circle'; }
            if(type === 'error') { bgColor = 'bg-red-600'; icon = 'fa-exclamation-circle'; }

            toast.className = `${bgColor} text-white px-4 py-3 rounded shadow-lg flex items-center gap-3 transform transition-all duration-300 translate-y-10 opacity-0`;
            toast.innerHTML = `<i class="fas ${icon}"></i> <span>${message}</span>`;
            
            container.appendChild(toast);
            
            // Animate in
            requestAnimationFrame(() => {
                toast.classList.remove('translate-y-10', 'opacity-0');
            });

            // Remove after 3s
            setTimeout(() => {
                toast.classList.add('opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function showModal(contentHtml) {
            const overlay = document.getElementById('modalOverlay');
            const content = document.getElementById('modalContent');
            content.innerHTML = contentHtml;
            content.className = 'bg-white rounded-xl shadow-2xl max-w-md w-full overflow-hidden modal-enter';
            overlay.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.add('hidden');
        }

        // Number formatter (e.g. 1000000 -> 1M)
        function formatNumber(num) {
            if (num >= 1000000000) return (num / 1000000000).toFixed(1).replace(/\.0$/, '') + 'B';
            if (num >= 1000000) return (num / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
            return num.toString();
        }

        // Routing
        function navigate(view, params = {}) {
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = ''; // clear

            if(view === 'home') renderHome(appDiv);
            else if(view === 'search') renderSearch(appDiv, params.query);
            else if(view === 'app') renderAppDetails(appDiv, params.id);
            else if(view === 'upload') renderUpload(appDiv);
            else if(view === 'admin') renderAdmin(appDiv);
            else if(view === 'settings') renderSettings(appDiv);
            
            window.scrollTo(0,0);
        }

        function performSearch() {
            const query = document.getElementById('searchInput').value.trim();
            if(query) navigate('search', { query });
        }

        function renderTopNav() {
            const nav = document.getElementById('navAuthSection');
            if(currentUser) {
                nav.innerHTML = `
                    ${currentUser.role === 'admin' ? `<button onclick="navigate('admin')" class="text-gray-600 hover:text-red-600" title="Admin Panel"><i class="fas fa-shield-alt text-xl"></i></button>` : ''}
                    <button onclick="navigate('upload')" class="text-gray-600 hover:text-play-green" title="Upload App"><i class="fas fa-upload text-xl"></i></button>
                    <div class="relative group cursor-pointer" onclick="navigate('settings')">
                        <div class="w-8 h-8 bg-play-green text-white rounded-full flex items-center justify-center font-bold">
                            ${currentUser.username.charAt(0).toUpperCase()}
                        </div>
                    </div>
                `;
            } else {
                nav.innerHTML = `
                    <button onclick="showLogin()" class="text-play-green font-medium hover:underline">Log in</button>
                    <button onclick="showRegister()" class="bg-play-green text-white px-4 py-2 rounded font-medium hover-bg-play-green transition-colors">Sign up</button>
                `;
            }
        }

        // Auth Modals & Logic
        window.showLogin = function() {
            showModal(`
                <div class="p-6">
                    <h2 class="text-2xl font-bold mb-4">Log in</h2>
                    <input type="text" id="loginUser" placeholder="Username" class="w-full border p-2 rounded mb-3 focus:outline-none focus:border-play-green">
                    <input type="password" id="loginPass" placeholder="Password" class="w-full border p-2 rounded mb-4 focus:outline-none focus:border-play-green">
                    <button onclick="processLogin()" class="w-full bg-play-green text-white py-2 rounded font-medium hover-bg-play-green mb-2">Log in</button>
                    <button onclick="closeModal()" class="w-full text-gray-500 py-2">Cancel</button>
                </div>
            `);
        }

        window.showRegister = function() {
            showModal(`
                <div class="p-6">
                    <h2 class="text-2xl font-bold mb-4">Create Account</h2>
                    <input type="text" id="regUser" placeholder="Username" class="w-full border p-2 rounded mb-3 focus:outline-none focus:border-play-green">
                    <input type="password" id="regPass" placeholder="Password" class="w-full border p-2 rounded mb-4 focus:outline-none focus:border-play-green">
                    <button onclick="processRegister()" class="w-full bg-play-green text-white py-2 rounded font-medium hover-bg-play-green mb-2">Sign up</button>
                    <button onclick="closeModal()" class="w-full text-gray-500 py-2">Cancel</button>
                </div>
            `);
        }

        window.processLogin = function() {
            const u = document.getElementById('loginUser').value.trim();
            const p = document.getElementById('loginPass').value;
            
            const user = db.users.find(x => x.username === u && x.password === p);
            if(!user) return showToast('Invalid credentials', 'error');
            if(user.isBanned) return showToast('This account is permanently banned.', 'error');
            if(checkIfIpBanned(user.ipToken)) return showToast('Your IP is permanently banned.', 'error');

            currentUser = user;
            localStorage.setItem('superdownloader_user', JSON.stringify(currentUser));
            closeModal();
            showToast(`Welcome back, ${u}!`, 'success');
            renderTopNav();
            navigate('home');
        }

        window.processRegister = function() {
            const u = document.getElementById('regUser').value.trim();
            const p = document.getElementById('regPass').value;
            
            if(!u || !p) return showToast('Fill all fields', 'error');
            if(db.users.some(x => x.username.toLowerCase() === u.toLowerCase())) {
                return showToast('Username already taken', 'error');
            }
            if(checkIfIpBanned(db.deviceIpToken)) {
                return showToast('Your IP is permanently banned.', 'error');
            }

            const newUser = {
                id: generateId(),
                username: u,
                password: p,
                role: 'user', // #7319112 for admin
                isBanned: false,
                ipBanned: false,
                joinDate: Date.now(),
                ipToken: db.deviceIpToken
            };

            db.users.push(newUser);
            currentUser = newUser;
            saveDb();
            closeModal();
            showToast('Account created!', 'success');
            renderTopNav();
            navigate('home');
        }

        window.logout = function(notify = true) {
            currentUser = null;
            localStorage.removeItem('superdownloader_user');
            if(notify) showToast('Logged out', 'info');
            renderTopNav();
            navigate('home');
        }

        // Views
        function renderHome(container) {
            const currentYear = new Date().getFullYear();
            const activeApps = db.apps.filter(a => !a.isDeleted);
            
            let html = `
                <div class="mb-8">
                    <h1 class="text-3xl font-bold text-gray-900 mb-2">Hits of ${currentYear}</h1>
                    <p class="text-gray-500 mb-6">Discover the most popular apps and games right now.</p>
                </div>
            `;

            if(activeApps.length === 0) {
                html += `
                    <div class="text-center py-20">
                        <i class="fas fa-ghost text-4xl text-gray-300 mb-4"></i>
                        <h2 class="text-xl text-gray-500">No apps uploaded yet.</h2>
                        <p class="text-sm text-gray-400 mt-2">Be the first to upload an app!</p>
                    </div>
                `;
            } else {
                // Sort by downloads
                const sorted = activeApps.sort((a,b) => b.downloads - a.downloads);
                html += `<div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">`;
                sorted.forEach(app => {
                    html += createAppCard(app);
                });
                html += `</div>`;
            }

            container.innerHTML = html;
        }

        function createAppCard(app) {
            const formatDl = formatNumber(app.downloads);
            return `
                <div class="bg-white rounded-xl p-4 shadow-sm hover:shadow-md transition-shadow cursor-pointer border border-gray-100 flex flex-col items-center text-center" onclick="navigate('app', {id: '${app.id}'})">
                    <img src="${app.img}" alt="${app.name}" class="w-20 h-20 rounded-2xl shadow-sm mb-3 object-cover" onerror="this.src='https://placehold.co/150x150/e2e8f0/64748b?text=APP'">
                    <h3 class="font-semibold text-gray-800 text-sm w-full truncate mb-1">${app.name}</h3>
                    <div class="text-xs text-gray-500 flex items-center justify-center gap-2">
                        <span>${app.rating} <i class="fas fa-star text-yellow-400 text-[10px]"></i></span>
                        <span>&bull;</span>
                        <span>${formatDl} dl</span>
                    </div>
                </div>
            `;
        }

        function renderAppDetails(container, appId) {
            const app = db.apps.find(a => a.id === appId);
            if(!app || app.isDeleted) {
                container.innerHTML = `<div class="text-center py-20 text-gray-500">App not found or removed.</div>`;
                return;
            }

            const author = db.users.find(u => u.id === app.devId);
            const authorName = author ? author.username : 'Unknown';
            const formatDl = formatNumber(app.downloads);

            // Badges HTML
            let badgesHtml = '';
            if(app.verified) badgesHtml += `<span class="bg-blue-100 text-blue-700 text-xs px-2 py-1 rounded-full font-medium flex items-center gap-1"><i class="fas fa-check-circle"></i> PlayDownloader Verified</span>`;
            if(app.educational) badgesHtml += `<span class="bg-green-100 text-green-700 text-xs px-2 py-1 rounded-full font-medium flex items-center gap-1"><i class="fas fa-book-open"></i> Educational +3</span>`;
            if(app.badges.includes('1M Downloads')) badgesHtml += `<span class="bg-yellow-100 text-yellow-700 text-xs px-2 py-1 rounded-full font-medium flex items-center gap-1"><i class="fas fa-medal"></i> 1M+ Club</span>`;

            let html = `
                <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-sm border border-gray-100 p-6 md:p-8">
                    <div class="flex flex-col md:flex-row gap-6 items-start">
                        <img src="${app.img}" class="w-32 h-32 rounded-3xl shadow-md object-cover" onerror="this.src='https://placehold.co/150x150/e2e8f0/64748b?text=APP'">
                        
                        <div class="flex-1">
                            <h1 class="text-3xl font-bold text-gray-900 mb-1">${app.name}</h1>
                            <p class="text-play-green font-medium mb-3">${authorName}</p>
                            
                            <div class="flex flex-wrap gap-2 mb-4">
                                ${badgesHtml}
                                <span class="bg-gray-100 text-gray-600 text-xs px-2 py-1 rounded-full font-medium">Age: ${app.ageRating}</span>
                            </div>

                            <div class="flex gap-8 text-center text-sm text-gray-600 mb-6">
                                <div>
                                    <div class="font-bold text-gray-900 text-lg">${app.rating} <i class="fas fa-star text-sm"></i></div>
                                    <div>Reviews</div>
                                </div>
                                <div class="w-px bg-gray-200"></div>
                                <div>
                                    <div class="font-bold text-gray-900 text-lg">${formatDl}+</div>
                                    <div>Downloads</div>
                                </div>
                                <div class="w-px bg-gray-200 hidden md:block"></div>
                                <div class="hidden md:block">
                                    <div class="font-bold text-gray-900 text-lg">${app.size}</div>
                                    <div>Size</div>
                                </div>
                            </div>

                            <div class="flex gap-3">
                                <button onclick="startDownload('${app.id}')" class="flex-1 bg-play-green hover-bg-play-green text-white py-3 px-6 rounded-full font-medium text-lg transition-colors flex justify-center items-center gap-2">
                                    <i class="fas fa-download"></i> Download
                                </button>
                                <button onclick="showToast('Starting simulation... (Not implemented)', 'info')" class="flex-1 border-2 border-play-green text-play-green py-3 px-6 rounded-full font-medium text-lg hover:bg-green-50 transition-colors flex justify-center items-center gap-2">
                                    <i class="fas fa-gamepad"></i> Play / Open
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <hr class="my-8">
                    
                    <div>
                        <h2 class="text-xl font-bold mb-4">About this app</h2>
                        <p class="text-gray-700 whitespace-pre-wrap">${app.desc}</p>
                    </div>

                    ${currentUser && currentUser.role === 'admin' ? `
                    <div class="mt-8 p-4 bg-red-50 border border-red-200 rounded-lg">
                        <h3 class="text-red-700 font-bold mb-2">Admin Actions</h3>
                        <div class="flex flex-wrap gap-2">
                            <button onclick="adminDeleteApp('${app.id}')" class="bg-red-600 text-white px-3 py-1 rounded text-sm hover:bg-red-700">Delete App</button>
                            <button onclick="adminToggleVerify('${app.id}')" class="bg-blue-600 text-white px-3 py-1 rounded text-sm hover:bg-blue-700">Toggle Verified</button>
                            <button onclick="adminToggleEdu('${app.id}')" class="bg-green-600 text-white px-3 py-1 rounded text-sm hover:bg-green-700">Toggle Edu Badge</button>
                            <button onclick="adminBanUser('${app.devId}')" class="bg-gray-800 text-white px-3 py-1 rounded text-sm hover:bg-gray-900">Ban Author</button>
                        </div>
                    </div>
                    ` : ''}
                </div>
            `;
            container.innerHTML = html;
        }

        window.startDownload = function(appId) {
            const app = db.apps.find(a => a.id === appId);
            if(!app) return;

            showModal(`
                <div class="p-6 text-center">
                    <h3 class="text-lg font-bold text-gray-900 mb-2">Downloading ${app.name}</h3>
                    <p class="text-sm text-gray-500 mb-4">Fetching and assembling P2P chunks...</p>
                    <div class="w-full bg-gray-200 rounded-full h-4 mb-2 overflow-hidden shadow-inner">
                        <div class="bg-play-green h-4 rounded-full transition-all duration-200" id="dlProgressBar" style="width: 0%"></div>
                    </div>
                    <p class="text-sm font-bold text-gray-700" id="dlProgressText">0%</p>
                </div>
            `);

            let progress = 0;
            const interval = setInterval(async () => {
                progress += Math.floor(Math.random() * 20) + 10;
                if(progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    document.getElementById('dlProgressBar').style.width = '100%';
                    document.getElementById('dlProgressText').textContent = '100%';

                    // Fetch heavy file from IndexedDB
                    const fileBlob = await getFileFromDB(appId);
                    
                    if(fileBlob) {
                        const url = URL.createObjectURL(fileBlob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = app.name.replace(/\s+/g, '_') + '.apk';
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        URL.revokeObjectURL(url); // Free memory immediately
                    } else {
                        showToast('Original file not found in local IndexedDB node. Download simulated.', 'error');
                    }

                    // Update stats
                    app.downloads += 1;
                    if(app.downloads >= 1000000 && !app.badges.includes('1M Downloads')) {
                        app.badges.push('1M Downloads');
                    }
                    saveDb();
                    
                    setTimeout(() => {
                        closeModal();
                        showToast('Download complete!', 'success');
                        navigate('app', {id: appId});
                    }, 800);
                } else {
                    document.getElementById('dlProgressBar').style.width = progress + '%';
                    document.getElementById('dlProgressText').textContent = progress + '%';
                }
            }, 300);
        }

        function renderUpload(container) {
            if(!currentUser) {
                container.innerHTML = `<div class="text-center py-20 text-gray-500">You must log in to upload apps.</div>`;
                return;
            }

            container.innerHTML = `
                <div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-sm border border-gray-100">
                    <h2 class="text-2xl font-bold mb-6 text-gray-800">Upload New Application</h2>
                    
                    <div id="uploadStep1">
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-700 mb-1">App Name</label>
                            <input type="text" id="upName" class="w-full border p-2 rounded focus:border-play-green outline-none">
                        </div>
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Short Description (Max 95 chars)</label>
                            <input type="text" id="upShort" maxlength="95" class="w-full border p-2 rounded focus:border-play-green outline-none">
                        </div>
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Full Description</label>
                            <textarea id="upDesc" rows="4" class="w-full border p-2 rounded focus:border-play-green outline-none"></textarea>
                        </div>
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Icon URL (Optional)</label>
                            <input type="text" id="upIcon" placeholder="https://" class="w-full border p-2 rounded focus:border-play-green outline-none">
                        </div>
                        <div class="mb-6 p-4 border-2 border-dashed border-gray-300 rounded bg-gray-50 text-center">
                            <label class="block text-sm font-bold text-gray-700 mb-2">Upload APK File (Required, Max 500GB supported via IndexedDB chunking)</label>
                            <input type="file" id="apkUploadInput" accept=".apk" class="hidden" onchange="handleApkSelect(event)">
                            <button onclick="document.getElementById('apkUploadInput').click()" class="bg-gray-200 text-gray-700 px-4 py-2 rounded hover:bg-gray-300 transition">Choose .apk File</button>
                            <p id="apkStatus" class="mt-2 text-sm text-play-green font-medium hidden"></p>
                        </div>
                        <button onclick="goToUploadStep2()" class="w-full bg-play-green text-white py-3 rounded-lg font-bold hover-bg-play-green">Next: Verification & Age Rating</button>
                    </div>

                    <div id="uploadStep2" class="hidden">
                        <h3 class="text-lg font-bold mb-4">Step 2: Verification & Rating</h3>
                        
                        <div class="bg-blue-50 p-4 rounded mb-4">
                            <h4 class="font-bold mb-2 text-blue-800">Two-Step Verification</h4>
                            <label class="flex items-center gap-2 mb-2 cursor-pointer">
                                <input type="checkbox" id="verifyRobot" class="w-4 h-4">
                                <span class="text-sm">I confirm I am not a robot.</span>
                            </label>
                            <label class="flex items-start gap-2 cursor-pointer">
                                <input type="checkbox" id="verifyTerms" class="w-4 h-4 mt-1">
                                <span class="text-sm">I accept the terms. I understand that uploading viruses or malicious files will result in a permanent ban (IP & Account).</span>
                            </label>
                        </div>

                        <div class="bg-gray-50 p-4 rounded mb-6">
                            <h4 class="font-bold mb-2">Age Rating Questionnaire</h4>
                            <label class="flex items-center justify-between mb-2 text-sm">
                                Is this an Educational App? 
                                <input type="checkbox" id="qEdu" class="w-4 h-4">
                            </label>
                            <label class="flex items-center justify-between mb-2 text-sm">
                                Does it contain realistic blood/violence? 
                                <input type="checkbox" id="qViolence" class="w-4 h-4">
                            </label>
                            <label class="flex items-center justify-between mb-2 text-sm">
                                Does it contain strong language or sexual content? 
                                <input type="checkbox" id="qAdult" class="w-4 h-4">
                            </label>
                            <label class="flex items-center justify-between mb-2 text-sm">
                                Does it allow unmoderated user interaction? 
                                <input type="checkbox" id="qSocial" class="w-4 h-4">
                            </label>
                        </div>

                        <div class="flex gap-4">
                            <button onclick="backToUploadStep1()" class="px-6 py-3 bg-gray-200 rounded-lg font-bold hover:bg-gray-300">Back</button>
                            <button onclick="publishApp()" class="flex-1 bg-play-green text-white py-3 rounded-lg font-bold hover-bg-play-green">Publish Application</button>
                        </div>
                    </div>
                </div>
            `;
        }

        window.handleApkSelect = function(event) {
            const file = event.target.files[0];
            const status = document.getElementById('apkStatus');
            if(!file) {
                status.classList.add('hidden');
                uploadState.rawFile = null;
                return;
            }

            if(!file.name.endsWith('.apk')) {
                showToast('Error: Only .apk files are allowed!', 'error');
                event.target.value = '';
                status.classList.add('hidden');
                uploadState.rawFile = null;
                return;
            }

            uploadState.rawFile = file;
            status.textContent = `Selected: ${file.name} (${(file.size/1024/1024).toFixed(2)} MB)`;
            status.classList.remove('hidden');
        }

        window.goToUploadStep2 = function() {
            const name = document.getElementById('upName').value.trim();
            if(!name || !uploadState.rawFile) {
                return showToast('Name and .apk file are mandatory!', 'error');
            }
            
            uploadState.metadata = {
                name: name,
                shortDesc: document.getElementById('upShort').value.trim(),
                desc: document.getElementById('upDesc').value.trim(),
                icon: document.getElementById('upIcon').value.trim()
            };

            document.getElementById('uploadStep1').classList.add('hidden');
            document.getElementById('uploadStep2').classList.remove('hidden');
        }

        window.backToUploadStep1 = function() {
            document.getElementById('uploadStep2').classList.add('hidden');
            document.getElementById('uploadStep1').classList.remove('hidden');
        }

        window.publishApp = async function() {
            if(!document.getElementById('verifyRobot').checked || !document.getElementById('verifyTerms').checked) {
                return showToast('You must complete the 2-step verification!', 'error');
            }

            const qEdu = document.getElementById('qEdu').checked;
            const qViol = document.getElementById('qViolence').checked;
            const qAdult = document.getElementById('qAdult').checked;
            const qSocial = document.getElementById('qSocial').checked;

            let age = '3+';
            if(qEdu) age = '3+ (Educational)';
            if(qSocial) age = '13+';
            if(qViol) age = '16+';
            if(qAdult) age = '18+';

            showModal(`
                <div class="p-6 text-center">
                    <h3 class="text-lg font-bold text-gray-900 mb-2">Publishing to Network...</h3>
                    <p class="text-sm text-gray-500 mb-4">Disassembling APK and saving securely in local IndexedDB node...</p>
                    <div class="w-full bg-gray-200 rounded-full h-4 mb-2 overflow-hidden shadow-inner">
                        <div class="bg-play-green h-4 rounded-full transition-all duration-200" id="upProgressBar" style="width: 0%"></div>
                    </div>
                    <p class="text-sm font-bold text-gray-700" id="upProgressText">0%</p>
                </div>
            `);

            let progress = 0;
            const interval = setInterval(async () => {
                progress += Math.floor(Math.random() * 15) + 5;
                if(progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    document.getElementById('upProgressBar').style.width = '100%';
                    document.getElementById('upProgressText').textContent = '100%';

                    const newAppId = generateId();

                    // Save massive file payload to IndexedDB
                    if(uploadState.rawFile) {
                        await saveFileToDB(newAppId, uploadState.rawFile);
                    }

                    // Save lightweight metadata to LocalStorage
                    const newApp = {
                        id: newAppId,
                        name: uploadState.metadata.name,
                        shortDesc: uploadState.metadata.shortDesc,
                        desc: uploadState.metadata.desc,
                        devId: currentUser.id,
                        version: '1.0.0',
                        size: (uploadState.rawFile.size/1024/1024).toFixed(2) + ' MB',
                        img: uploadState.metadata.icon || 'https://placehold.co/150x150/e2e8f0/64748b?text=APK',
                        downloads: 0,
                        rating: '0.0',
                        verified: false,
                        educational: qEdu,
                        badges: [],
                        ageRating: age,
                        isDeleted: false,
                        timestamp: Date.now()
                    };

                    db.apps.push(newApp);
                    saveDb();

                    // Clean state
                    uploadState = { metadata: {}, fileData: null, rawFile: null };

                    setTimeout(() => {
                        closeModal();
                        showToast('App published successfully!', 'success');
                        navigate('app', {id: newAppId});
                    }, 600);
                } else {
                    document.getElementById('upProgressBar').style.width = progress + '%';
                    document.getElementById('upProgressText').textContent = progress + '%';
                }
            }, 250);
        }

        function renderSettings(container) {
            if(!currentUser) return navigate('home');
            container.innerHTML = `
                <div class="max-w-xl mx-auto bg-white p-8 rounded-xl shadow-sm border border-gray-100">
                    <h2 class="text-2xl font-bold mb-6">Settings</h2>
                    
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                        <div class="flex gap-2">
                            <input type="text" id="setUserName" value="${currentUser.username}" class="flex-1 border p-2 rounded focus:border-play-green outline-none" disabled>
                        </div>
                        <p class="text-xs text-gray-500 mt-1">Username changes not allowed in current version to preserve P2P links.</p>
                    </div>

                    <div class="mb-8">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Change Password</label>
                        <input type="password" id="setPass" placeholder="New Password" class="w-full border p-2 rounded mb-2 focus:border-play-green outline-none">
                        <button onclick="changePassword()" class="bg-gray-800 text-white px-4 py-2 rounded hover:bg-gray-900 text-sm">Update Password</button>
                    </div>

                    <hr class="my-6">

                    <div class="flex flex-col gap-3">
                        <button onclick="logout()" class="w-full border border-gray-300 text-gray-700 py-2 rounded font-medium hover:bg-gray-50">Log out</button>
                        <button onclick="confirmDeleteAccount()" class="w-full bg-red-50 text-red-600 border border-red-200 py-2 rounded font-medium hover:bg-red-100">Delete Account Permanently</button>
                    </div>
                </div>
            `;
        }

        window.changePassword = function() {
            const p = document.getElementById('setPass').value;
            if(!p) return;
            const u = db.users.find(x => x.id === currentUser.id);
            if(u) {
                u.password = p;
                saveDb();
                document.getElementById('setPass').value = '';
                showToast('Password updated!', 'success');
            }
        }

        window.confirmDeleteAccount = function() {
            showModal(`
                <div class="p-6 text-center">
                    <div class="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center text-3xl mx-auto mb-4"><i class="fas fa-exclamation-triangle"></i></div>
                    <h3 class="text-lg font-bold mb-2">Delete Account?</h3>
                    <p class="text-sm text-gray-600 mb-6">This will permanently delete your account and remove all your apps from the network.</p>
                    <div class="flex justify-center gap-4">
                        <button onclick="closeModal()" class="px-6 py-2 border rounded font-medium text-gray-600 hover:bg-gray-50">Cancel</button>
                        <button onclick="deleteAccountFinal()" class="px-6 py-2 bg-red-600 text-white rounded font-medium hover:bg-red-700">Delete</button>
                    </div>
                </div>
            `);
        }

        window.deleteAccountFinal = function() {
            db.apps.forEach(a => {
                if(a.devId === currentUser.id) a.isDeleted = true;
            });
            const idx = db.users.findIndex(x => x.id === currentUser.id);
            if(idx > -1) db.users.splice(idx, 1);
            saveDb();
            closeModal();
            logout(false);
            showToast('Account deleted.', 'info');
        }

        function renderAdmin(container) {
            if(!currentUser || currentUser.role !== 'admin') return navigate('home');
            
            const usersHtml = db.users.map(u => `
                <tr class="border-t text-sm">
                    <td class="py-2">${u.username} ${u.role === 'admin' ? '<i class="fas fa-star text-yellow-500"></i>' : ''}</td>
                    <td class="py-2">
                        ${u.isBanned ? '<span class="text-red-500 font-bold">Banned</span>' : '<span class="text-green-500">Active</span>'}
                        ${u.ipBanned ? '<span class="text-red-800 font-bold ml-2">(IP BANNED)</span>' : ''}
                    </td>
                    <td class="py-2 text-right">
                        ${!u.isBanned ? `<button onclick="adminBanUser('${u.id}')" class="text-red-600 hover:underline mr-2">Ban</button>` : `<button onclick="adminUnbanUser('${u.id}')" class="text-green-600 hover:underline mr-2">Unban</button>`}
                        ${!u.ipBanned ? `<button onclick="adminIPBanUser('${u.id}')" class="text-red-800 font-bold hover:underline">IP Ban</button>` : `<button onclick="adminUnbanIPUser('${u.id}')" class="text-green-800 hover:underline">Unban IP</button>`}
                    </td>
                </tr>
            `).join('');

            container.innerHTML = `
                <div class="max-w-5xl mx-auto">
                    <h2 class="text-3xl font-bold mb-6 text-gray-900"><i class="fas fa-shield-alt text-play-green"></i> System Admin Panel</h2>
                    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-6">
                        <h3 class="text-xl font-bold mb-4">User Management</h3>
                        <table class="w-full text-left">
                            <thead>
                                <tr class="text-gray-500 text-sm">
                                    <th class="pb-2">Username</th>
                                    <th class="pb-2">Status</th>
                                    <th class="pb-2 text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody>${usersHtml}</tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        // Admin Actions
        window.adminDeleteApp = function(appId) {
            const app = db.apps.find(a => a.id === appId);
            if(app) { app.isDeleted = true; saveDb(); showToast('App deleted.', 'info'); navigate('home'); }
        }
        window.adminToggleVerify = function(appId) {
            const app = db.apps.find(a => a.id === appId);
            if(app) { app.verified = !app.verified; saveDb(); showToast('Verification toggled.', 'success'); renderAppDetails(document.getElementById('app'), appId); }
        }
        window.adminToggleEdu = function(appId) {
            const app = db.apps.find(a => a.id === appId);
            if(app) { app.educational = !app.educational; saveDb(); showToast('Edu badge toggled.', 'success'); renderAppDetails(document.getElementById('app'), appId); }
        }
        window.adminBanUser = function(userId) {
            const u = db.users.find(x => x.id === userId);
            if(u) { u.isBanned = true; saveDb(); showToast(`${u.username} banned.`, 'success'); navigate('admin'); }
        }
        window.adminUnbanUser = function(userId) {
            const u = db.users.find(x => x.id === userId);
            if(u) { u.isBanned = false; saveDb(); showToast(`${u.username} unbanned.`, 'success'); navigate('admin'); }
        }
        window.adminIPBanUser = function(userId) {
            const u = db.users.find(x => x.id === userId);
            if(u) { u.isBanned = true; u.ipBanned = true; saveDb(); showToast(`${u.username} IP Banned!`, 'success'); navigate('admin'); }
        }
        window.adminUnbanIPUser = function(userId) {
            const u = db.users.find(x => x.id === userId);
            if(u) { u.ipBanned = false; saveDb(); showToast(`${u.username} IP unbanned.`, 'success'); navigate('admin'); }
        }

        // Boot up
        window.onload = async function() {
            await initFileDB(); // Start IndexedDB for heavy APKs
            initDb();           // Load lightweight localstorage metadata
            navigate('home');
        };
    </script>
</body>
</html>
