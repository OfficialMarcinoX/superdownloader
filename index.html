    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        .rank-tooltip { position: relative; display: inline-flex; align-items: center; cursor: help; }
        .rank-tooltip .tooltip-text {
            visibility: hidden; color: #fff; text-align: center;
            border-radius: 6px; padding: 6px 12px; position: absolute; z-index: 50;
            bottom: 125%; left: 50%; transform: translateX(-50%); opacity: 0;
            transition: opacity 0.2s; white-space: nowrap; font-size: 0.75rem; font-weight: bold;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2); border: 1px solid rgba(255,255,255,0.1);

        .rank-tooltip:hover .tooltip-text { visibility: visible; opacity: 1; }

            Ban: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"></path></svg>,
            Chat: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>,
            Back: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>,
            Google: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>,
            Dashboard: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>,
            Edit: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>,
            Heart: ({ filled }) => <svg className="w-5 h-5" fill={filled ? "currentColor" : "none"} stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
        };

        const CATEGORIES = ['.exe', '.js', '.json', '.html', '.py', '.pyw', 'Video/Audio', 'Other'];

        const generateId = () => Math.random().toString(36).substr(2, 6);
        const formatBytes = (bytes, decimals = 2) => {
            if (!+bytes) return '0 Bytes';
            const k = 1024; const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
        };

        const UserBadge = ({ nick, usersList, onClick }) => {
            const u = usersList[nick];
            if (!u) return (
                <span className="text-red-300 text-[10px] font-black bg-red-900/40 px-2 py-0.5 rounded border border-red-500/50 inline-flex items-center gap-1 uppercase tracking-wider" title="Account deleted">
                    <Icons.Alert /> User can't be loaded
                </span>
            );
            
            let badgeClass = "text-gray-300 font-medium hover:text-white cursor-pointer";
            let content = nick;

            if (u.role === 'owner') {
                badgeClass = "rank-tooltip group inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-lg bg-gradient-to-r from-amber-500/20 to-yellow-600/20 border border-yellow-500/40 shadow-[0_0_15px_rgba(234,179,8,0.25)] cursor-pointer hover:scale-105 transition";
                content = (
                    <React.Fragment>
                        <Icons.Crown />
                        <span className="font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 via-amber-200 to-yellow-500 tracking-wide drop-shadow-sm">{nick}</span>
                        <span className="tooltip-text text-yellow-100 border-yellow-500/50 bg-slate-900/95 backdrop-blur-md">Owner Of Superdownloader</span>
                    </React.Fragment>
                );
            } else if (u.role === 'admin') {
                badgeClass = "rank-tooltip group inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-lg bg-gradient-to-r from-blue-500/20 to-indigo-600/20 border border-blue-500/40 shadow-[0_0_15px_rgba(59,130,246,0.25)] cursor-pointer hover:scale-105 transition";
                content = (
                    <React.Fragment>
                        <Icons.Shield />
                        <span className="font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-300 to-indigo-300 tracking-wide drop-shadow-sm">{nick}</span>
                        <span className="tooltip-text text-blue-100 border-blue-500/50 bg-slate-900/95 backdrop-blur-md">Admin Of superdownloader</span>
                    </React.Fragment>
                );
            }

            return <span className={badgeClass} onClick={(e) => { e.stopPropagation(); if(onClick) onClick(nick); }}>{content}</span>;
        };

        const AuthView = ({ usersList, setUser, setView, showMessage, updateDatabase }) => {
            const [isLogin, setIsLogin] = useState(true);
            const [nick, setNick] = useState('');
            const [pass, setPass] = useState('');
            const [authStep, setAuthStep] = useState(0); // 0 = standard, 1 = wait for email, 2 = enter code
            const [googleEmail, setGoogleEmail] = useState('');
            const [generatedCode, setGeneratedCode] = useState('');
            const [inputCode, setInputCode] = useState('');

            const loginDirectly = (userData, method) => {
                setUser(userData);
                localStorage.setItem('dwn_user_auth', JSON.stringify(userData));
                setView('home');
                showMessage(`Welcome back via ${method}, ${userData.nick}!`, "success");
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if(!navigator.onLine) return showMessage("Internet required for authentication!", "error");
                
                // FORCE FRESH READ FROM DISK (Fixes the login bug!)
                const currentDb = JSON.parse(localStorage.getItem('superdwn_netdb') || '{"users":{}}');
                const freshUsersList = currentDb.users || {};
                const existingUser = freshUsersList[nick];

                if (isLogin) {
                    if (!existingUser) {
                        showMessage("User not found or account deleted!", "error");
                    } else if (existingUser.pass !== pass) {
                        showMessage("Invalid password", "error");
                    } else {
                        loginDirectly({ nick: existingUser.nick, role: existingUser.role || 'user' }, 'Password');
                    }
                } else {
                    if (existingUser) {
                        showMessage("Username already taken in the network!", "error");
                    } else {
                        const newUser = { nick, pass, role: 'user', isBanned: false, createdAt: Date.now() };
                        updateDatabase('users', nick, newUser);
                        loginDirectly({ nick, role: 'user' }, 'Registration');
                    }
                }
            };

            const handleGoogleAuthStart = () => {
                if(!navigator.onLine) return showMessage("Internet required!", "error");
                const email = prompt("Enter your Gmail to receive a 6-digit confirmation code:");
                if(!email || !email.includes('@')) return showMessage("Invalid email format", "error");
                
                setGoogleEmail(email);
                const code = Math.floor(100000 + Math.random() * 900000).toString();
                setGeneratedCode(code);
                setAuthStep(1);

                // Simulate Email Sending via Alert (Since no backend exists for GitHub Pages)
                setTimeout(() => {
                    alert(`[GMAIL SIMULATION]\nFrom: auth@superdownloader.net\nTo: ${email}\n\nYour Google Verification Code is: ${code}\n\n(This is a secure simulation because a true email requires a paid backend server).`);
                    setAuthStep(2);
                }, 1500);
            };

            const verifyGoogleCode = (e) => {
                e.preventDefault();
                if(inputCode !== generatedCode) return showMessage("Invalid Code!", "error");
                
                const generatedNick = googleEmail.split('@')[0].replace(/[^a-zA-Z0-9_]/g, '');
                const currentDb = JSON.parse(localStorage.getItem('superdwn_netdb') || '{"users":{}}');
                const existingUser = (currentDb.users || {})[generatedNick];

                if (existingUser) {
                    loginDirectly({ nick: existingUser.nick, role: existingUser.role || 'user' }, 'Google');
                } else {
                    const securePass = "gauth_" + Math.random().toString(36).substr(2);
                    const newUser = { nick: generatedNick, pass: securePass, role: 'user', isBanned: false, createdAt: Date.now() };
                    updateDatabase('users', generatedNick, newUser);
                    loginDirectly({ nick: generatedNick, role: 'user' }, 'Google');
                }
            };

            if (authStep > 0) {
                return (
                    <div className="flex justify-center items-center h-full mt-20">
                        <div className="glass-panel p-8 rounded-xl w-full max-w-md shadow-2xl text-center">
                            <Icons.Shield className="w-12 h-12 mx-auto text-blue-400 mb-4" />
                            <h2 className="text-2xl font-black mb-2">Two-Factor Authentication</h2>
                            {authStep === 1 ? (
                                <p className="text-gray-400 mb-6">Sending 6-digit code to <b className="text-white">{googleEmail}</b>...</p>
                            ) : (
                                <form onSubmit={verifyGoogleCode} className="space-y-4">
                                    <p className="text-gray-400 mb-4">Enter the 6-digit code sent to your email.</p>
                                    <input autoFocus required type="text" maxLength="6" value={inputCode} onChange={e => setInputCode(e.target.value.replace(/\D/g, ''))} className="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-white text-center text-2xl tracking-widest outline-none focus:border-blue-500 transition-all shadow-inner" placeholder="000000" />
                                    <button type="submit" className="w-full bg-blue-600 hover:bg-blue-500 transition-all rounded-xl p-4 font-bold text-lg shadow-lg">Verify</button>
                                    <button type="button" onClick={() => setAuthStep(0)} className="w-full bg-transparent border border-slate-700 hover:bg-slate-800 transition-all rounded-xl p-3 font-bold text-gray-400">Cancel</button>
                                </form>
                            )}
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex justify-center items-center h-full mt-20">
                    <div className="glass-panel p-8 rounded-xl w-full max-w-md shadow-2xl">
                        <h2 className="text-3xl font-black mb-8 text-center bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-indigo-300">{isLogin ? 'Welcome Back' : 'Join Network'}</h2>
                        <form onSubmit={handleSubmit} className="space-y-5">
                            <div>
                                <label className="block text-sm text-gray-400 mb-1 font-medium">Username</label>
                                <input required type="text" name="username" autoComplete="username" value={nick} onChange={e => setNick(e.target.value.replace(/[^a-zA-Z0-9_]/g, ''))} className="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-white outline-none focus:border-blue-500 transition-all shadow-inner" placeholder="e.g., planexd_0" />
                            </div>
                            <div>
                                <label className="block text-sm text-gray-400 mb-1 font-medium">Password</label>
                                <input required type="password" name="password" autoComplete={isLogin ? "current-password" : "new-password"} value={pass} onChange={e => setPass(e.target.value)} className="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-white outline-none focus:border-blue-500 transition-all shadow-inner" placeholder="••••••••" />
                            </div>
                            <button type="submit" className="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 transition-all rounded-xl p-4 font-bold text-lg shadow-lg hover:shadow-blue-500/25 active:scale-[0.98]">
                                {isLogin ? 'Sign In' : 'Create Account'}
                            </button>
                        </form>

                        <div className="mt-8">
                            <div className="relative">
                                <div className="absolute inset-0 flex items-center"><div className="w-full border-t border-slate-700"></div></div>
                                <div className="relative flex justify-center text-sm"><span className="px-2 bg-slate-900 text-gray-500 font-bold uppercase tracking-wider">Or continue with</span></div>
                            </div>
                            <div className="mt-6">
                                <button onClick={handleGoogleAuthStart} className="w-full flex items-center justify-center gap-3 bg-slate-800 hover:bg-slate-700 border border-slate-700 transition-all rounded-xl p-3 text-white font-medium shadow-inner hover:shadow-lg hover:border-slate-500 active:scale-95">
                                    <Icons.Google /> Secure Google Login (2FA)
                                </button>
                            </div>
                        </div>

                        <div className="mt-6 text-center">
                            <span className="text-sm text-gray-400 cursor-pointer hover:text-white transition-colors border-b border-transparent hover:border-white pb-1" onClick={() => setIsLogin(!isLogin)}>
                                {isLogin ? "Don't have an account? Register." : 'Already have an account? Login.'}
                            </span>
                        </div>
                    </div>
                </div>
            );
        };

        const UploadView = ({ user, updateDatabase, showMessage, setView }) => {
            const [name, setName] = useState('');
            const [desc, setDesc] = useState('');
            const [imgUrl, setImgUrl] = useState('');
            const [category, setCategory] = useState(CATEGORIES[0]);
            const [file, setFile] = useState(null);
            const [scanning, setScanning] = useState(false);
            const [scanResult, setScanResult] = useState(null);

            const handleFileChange = (e) => {
                const selected = e.target.files[0];
                if(selected) {
                    setFile(selected);
                    setScanResult(null);
                    if(!name) setName(selected.name);
                }
            };

            const handleImageChange = (e) => {
                const selectedImg = e.target.files[0];
                if (selectedImg) {
                    if (selectedImg.size > 100 * 1024) { 
                        showMessage("Image is too large (max 100 KB)!", "error");
                        e.target.value = null; 
                        setImgUrl('');
                        return;
                    }
                    const reader = new FileReader();
                    reader.onload = (ev) => setImgUrl(ev.target.result);
                    reader.readAsDataURL(selectedImg);
                } else {
                    setImgUrl('');
                }
            };

            const performAntivirusScan = async (fileObj, fileDesc) => {
                setScanning(true);
                const offlineFallbackScan = async () => {
                    await new Promise(r => setTimeout(r, 1000));
                    const maliciousKeywords = ['trojan', 'hack', 'stealer', 'virus', 'malware'];
                    const isMalicious = maliciousKeywords.some(w => fileObj.name.toLowerCase().includes(w));
                    setScanning(false);
                    if (isMalicious) {
                        setScanResult({ safe: false, msg: 'Threat detected (Offline Backup Heuristics)!' });
                        return false;
                    }
                    setScanResult({ safe: true, msg: 'File is clean. (Offline Backup Scan)' });
                    return true;
                };

                if (!GEMINI_API_KEY || GEMINI_API_KEY === "TUTAJ_WKLEJ_SWOJ_KLUCZ_API") return await offlineFallbackScan();

                try {
                    let fileContentSnippet = "Not analyzed (binary, large file, or empty).";
                    const textExtensions = ['.js', '.py', '.html', '.json', '.txt', '.bat', '.cmd', '.pyw', '.sh'];
                    const isText = textExtensions.some(ext => fileObj.name.toLowerCase().endsWith(ext));
                    
                    if (isText && fileObj.size > 0 && fileObj.size < 100 * 1024) { 
                        const reader = new FileReader();
                        fileContentSnippet = await new Promise(resolve => {
                            reader.onload = e => resolve(e.target.result.substring(0, 15000)); 
                            reader.onerror = () => resolve("Could not read file.");
                            reader.readAsText(fileObj);
                        });
                    }

                    const promptText = `As an expert cybersecurity analyst, analyze this file.
                    File Name: "${fileObj.name}"
                    Size: ${fileObj.size} bytes
                    Description: "${fileDesc || 'No description'}"
                    Code Snippet: """${fileContentSnippet}"""

                    CRITICAL RULES:
                    1. DEFAULT TO SAFE. If the file is empty, unknown, a simple game, or a normal script, it is SAFE.
                    2. ONLY flag as unsafe (safe: false) if the code snippet clearly shows malicious intent (stealing tokens, destroying OS, malicious payloads) or if it's a known dangerous binary pattern.
                    3. DO NOT flag just because the name contains 'hack', 'cheat', or is missing an extension.
                    
                    Respond ONLY in valid JSON format:
                    {"safe": true, "msg": "Short reason in English"}`;

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            contents: [{ parts: [{ text: promptText }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    if (!response.ok) throw new Error(`API HTTP Error`);

                    const data = await response.json();
                    const aiResult = JSON.parse(data.candidates[0].content.parts[0].text);

                    setScanning(false);
                    setScanResult({ safe: aiResult.safe, msg: aiResult.msg + ' (Scanned by Gemini AI)' });
                    return aiResult.safe;

                } catch (error) {
                    console.warn("AI Server Error. Falling back to offline scanner:", error);
                    return await offlineFallbackScan();
                }
            };

            const handleUpload = async (e) => {
                e.preventDefault();
                if(!navigator.onLine) return showMessage("No internet connection!", "error");
                if (!file) return showMessage("Select a file!", "error");
                
                const isSafe = await performAntivirusScan(file, desc);
                if (!isSafe) return showMessage("Blocked by Antivirus AI!", "error");

                const fileId = generateId();
                const metadata = {
                    id: fileId, name, desc, img: imgUrl, category,
                    uploader: user.nick, timestamp: Date.now(),
                    size: file.size, fileName: file.name,
                    downloads: 0, likes: []
                };

                showMessage("Uploading to network...", "info");

                if (file.size < 50 * 1024) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        updateDatabase('files', fileId, { ...metadata, dataUrl: ev.target.result, isDirectLink: false });
                        showMessage("Saved permanently!", "success");
                        window.location.hash = `#/file/${fileId}`;
                    };
                    reader.readAsDataURL(file);
                } else {
                    localforage.setItem(`seed_${fileId}`, file);
                    webtorrentClient.seed(file, (torrent) => {
                        updateDatabase('files', fileId, { ...metadata, magnet: torrent.magnetURI, isDirectLink: true });
                        showMessage("Added! You are now directly seeding this file.", "success");
                        window.location.hash = `#/file/${fileId}`;
                    });
                }
            };

            return (
                <div className="max-w-2xl mx-auto mt-10 p-8 glass-panel rounded-xl">
                    <h2 className="text-2xl font-bold mb-6 flex items-center gap-2"><Icons.Upload /> Upload File</h2>
                    <form onSubmit={handleUpload} className="space-y-5">
                        <div>
                            <label className="block text-sm text-gray-400 mb-1">Name (Required)</label>
                            <input required type="text" value={name} onChange={e=>setName(e.target.value)} className="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white outline-none" />
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                            <div>
                                <label className="block text-sm text-gray-400 mb-1">Category</label>
                                <select value={category} onChange={e=>setCategory(e.target.value)} className="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white outline-none">
                                    {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="block text-sm text-gray-400 mb-1">Cover Image (Max 100 KB)</label>
                                <input type="file" accept="image/*" onChange={handleImageChange} className="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-white outline-none" />
                            </div>
                        </div>
                        <div>
                            <label className="block text-sm text-gray-400 mb-1">Description (Optional)</label>
                            <textarea value={desc} onChange={e=>setDesc(e.target.value)} className="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white outline-none h-24" />
                        </div>
                        <div>
                            <label className="block text-sm text-gray-400 mb-1">File to upload</label>
                            <input required type="file" onChange={handleFileChange} className="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-white outline-none" />
                            {file && <p className="text-sm mt-1 text-gray-400">Size: {formatBytes(file.size)}</p>}
                        </div>

                        {scanning && (
                            <div className="flex items-center gap-2 text-yellow-400 bg-yellow-400/10 p-3 rounded-lg">
                                <Icons.Shield /> <span>Deep Code Scanning via AI...</span>
                            </div>
                        )}
                        {scanResult && (
                            <div className={`flex items-center gap-2 p-3 rounded-lg ${scanResult.safe ? 'text-green-400 bg-green-400/10' : 'text-red-400 bg-red-400/10'}`}>
                                <Icons.Shield /> <span>{scanResult.msg}</span>
                            </div>
                        )}

                        <button disabled={scanning} type="submit" className="w-full bg-blue-600 hover:bg-blue-700 disabled:opacity-50 transition rounded-lg p-3 font-bold mt-4">
                            Publish File
                        </button>
                    </form>
                </div>
            );
        };

        const FileDetailsView = ({ user, files, selectedFileId, comments, usersList, updateDatabase, showMessage, setView }) => {
            const [commentText, setCommentText] = useState('');
            const [downloadingId, setDownloadingId] = useState(null);
            
            const file = files[selectedFileId];
            if (!file) return <div className="text-center mt-20 text-red-400 text-xl font-bold">File not found or removed.</div>;

            const fileComments = Object.values(comments).filter(c => c.fileId === file.id).sort((a,b) => b.timestamp - a.timestamp);
            const likesCount = file.likes ? file.likes.length : 0;
            const hasLiked = user && file.likes && file.likes.includes(user.nick);

            const toggleLike = () => {
                if(!user) return showMessage("Login to like files.", "error");
                let newLikes = file.likes ? [...file.likes] : [];
                if(hasLiked) {
                    newLikes = newLikes.filter(n => n !== user.nick);
                } else {
                    newLikes.push(user.nick);
                }
                updateDatabase('files', file.id, { ...file, likes: newLikes });
            };

            const handleReport = () => {
                if(!user) return showMessage("Login to report.", "error");
                const reason = prompt(`Reason for reporting ${file.name}:`);
                if(reason) {
                    updateDatabase('reports', generateId(), { fileId: file.id, reason, reporter: user.nick, timestamp: Date.now() });
                    showMessage("Report submitted", "success");
                }
            };

            const executeDownload = () => {
                if(!navigator.onLine && file.isDirectLink) return showMessage("No internet connection for P2P", "error");
                
                const incrementDownload = () => updateDatabase('files', file.id, { ...file, downloads: (file.downloads || 0) + 1 });

                if (!file.isDirectLink) {
                    const a = document.createElement('a');
                    a.href = file.dataUrl;
                    a.download = file.fileName || file.name;
                    a.click();
                    incrementDownload();
                    showMessage("Download started from network memory.", "success");
                } else {
                    setDownloadingId(file.id);
                    showMessage("Establishing Direct Connection...", "info");
                    
                    webtorrentClient.add(file.magnet, (torrent) => {
                        torrent.files.forEach(tFile => {
                            tFile.getBlobURL((err, url) => {
                                if (err) {
                                    showMessage("Seeder is offline.", "error");
                                    setDownloadingId(null);
                                    return;
                                }

                                tFile.getBlob((err, blob) => {
                                    if(!err && blob) {
                                        const newFile = new File([blob], tFile.name, {type: blob.type});
                                        localforage.setItem(`seed_${file.id}`, newFile);
                                        webtorrentClient.seed(newFile);
                                    }
                                });

                                const a = document.createElement('a');
                                a.href = url;
                                a.download = tFile.name;
                                a.click();
                                incrementDownload();
                                showMessage("Download completed!", "success");
                                setDownloadingId(null);
                            });
                        });
                    });
                    
                    setTimeout(() => {
                        if(downloadingId === file.id) {
                            setDownloadingId(null);
                            showMessage("Cannot connect. Seeder is offline.", "error");
                        }
                    }, 25000);
                }
            };

            useEffect(() => {
                if (window.location.hash.startsWith('#/download/')) {
                    executeDownload();
                    window.history.replaceState(null, null, `#/file/${file.id}`);
                }
            }, []);

            const postComment = (e) => {
                e.preventDefault();
                if (!user) return showMessage("You must be logged in to comment.", "error");
                if (!commentText.trim()) return;

                const commentId = generateId();
                updateDatabase('comments', commentId, { fileId: file.id, author: user.nick, text: commentText, timestamp: Date.now() });
                setCommentText('');
                showMessage("Comment added!", "success");
            };

            return (
                <div className="max-w-5xl mx-auto mt-8 px-4 pb-12">
                    <button onClick={() => window.location.hash = ''} className="mb-6 flex items-center gap-2 text-blue-400 hover:text-blue-300 font-bold transition">
                        <Icons.Back /> Back to Library
                    </button>

                    <div className="glass-panel rounded-xl overflow-hidden shadow-2xl flex flex-col md:flex-row mb-10 relative">
                        <div className="absolute top-4 right-4 bg-slate-900/80 p-2 rounded-lg border border-slate-700 flex items-center gap-2 z-10 text-pink-400 font-bold cursor-pointer hover:scale-105 transition" onClick={toggleLike}>
                            <Icons.Heart filled={hasLiked} /> {likesCount}
                        </div>

                        <div className="md:w-1/3 bg-slate-900 flex items-center justify-center relative min-h-[300px] border-b md:border-b-0 md:border-r border-slate-700">
                            {file.img ? (
                                <img src={file.img} alt={file.name} className="w-full h-full object-cover" />
                            ) : (
                                <div className="text-gray-500 font-medium">No Cover Image</div>
                            )}
                        </div>
                        
                        <div className="md:w-2/3 p-8 flex flex-col">
                            <div className="flex justify-between items-start mb-4 pr-16">
                                <h1 className="text-4xl font-extrabold text-white leading-tight">{file.name}</h1>
                            </div>
                            
                            <div className="flex items-center gap-4 text-sm text-gray-400 mb-6 border-b border-slate-700 pb-6">
                                <div className="flex items-center gap-2">By: <UserBadge nick={file.uploader} usersList={usersList} onClick={(n) => window.location.hash = `#/user/${n}`} /></div>
                                <div className="w-1 h-1 rounded-full bg-slate-600"></div>
                                <div>{file.size ? formatBytes(file.size) : 'Unknown size'}</div>
                                <div className="w-1 h-1 rounded-full bg-slate-600"></div>
                                <div className="text-blue-400 font-bold">{file.category}</div>
                                <div className="w-1 h-1 rounded-full bg-slate-600"></div>
                                <div className="text-green-400 font-bold">{file.downloads || 0} Downloads</div>
                            </div>

                            <div className="prose prose-invert text-gray-300 flex-1 mb-8 whitespace-pre-wrap">
                                {file.desc || 'No description provided by the author.'}
                            </div>

                            <div className="flex flex-col sm:flex-row gap-4 mt-auto">
                                <button 
                                    onClick={executeDownload} 
                                    disabled={downloadingId === file.id}
                                    className="flex-1 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 disabled:opacity-50 transition py-4 rounded-xl font-bold flex justify-center items-center gap-3 text-lg shadow-lg">
                                    {downloadingId === file.id ? 'Connecting...' : <React.Fragment><Icons.Download/> Download</React.Fragment>}
                                </button>
                                <button onClick={() => { navigator.clipboard.writeText(window.location.href); showMessage("Link copied!", "success"); }} className="bg-slate-800 hover:bg-slate-700 border border-slate-700 transition px-6 rounded-xl flex justify-center items-center text-white font-medium shadow-inner">
                                    Copy Link
                                </button>
                                <button onClick={handleReport} className="bg-slate-800 hover:bg-red-600/20 border border-slate-700 hover:border-red-500/50 transition px-4 rounded-xl flex justify-center items-center text-gray-400 hover:text-red-400">
                                    <Icons.Alert />
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* COMMENTS */}
                    <div className="glass-panel p-8 rounded-xl shadow-lg">
                        <h3 className="text-2xl font-bold mb-6 flex items-center gap-2"><Icons.Chat /> Community Comments</h3>
                        {user ? (
                            <form onSubmit={postComment} className="mb-8 flex gap-4">
                                <input type="text" value={commentText} onChange={(e) => setCommentText(e.target.value)} placeholder="Add a comment..." className="flex-1 bg-slate-900 border border-slate-700 rounded-lg p-4 text-white outline-none focus:border-blue-500 transition" maxLength={250} />
                                <button type="submit" className="bg-blue-600 hover:bg-blue-700 transition px-8 rounded-lg font-bold">Post</button>
                            </form>
                        ) : (
                            <div className="mb-8 p-4 bg-slate-800/50 rounded-lg text-center text-gray-400 border border-slate-700">You must be logged in to post comments.</div>
                        )}

                        <div className="space-y-4">
                            {fileComments.length === 0 && <p className="text-gray-500 italic">No comments yet. Be the first!</p>}
                            {fileComments.map(c => (
                                <div key={c.id || Math.random()} className="bg-slate-900/50 border border-slate-800 p-4 rounded-lg flex flex-col">
                                    <div className="flex justify-between items-center mb-2">
                                        <UserBadge nick={c.author} usersList={usersList} onClick={(n) => window.location.hash = `#/user/${n}`} />
                                        <span className="text-xs text-gray-500">{new Date(c.timestamp).toLocaleString()}</span>
                                    </div>
                                    <p className="text-gray-300">{c.text}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const DashboardView = ({ user, files, updateDatabase, showMessage }) => {
            const [editingFile, setEditingFile] = useState(null);
            
            const myFiles = Object.values(files).filter(f => f && f.uploader === user.nick).sort((a,b) => b.timestamp - a.timestamp);

            const handleDelete = (id) => {
                if(confirm("Are you sure you want to delete YOUR file permanently?")) {
                    updateDatabase('files', id, null);
                    showMessage("File deleted.", "success");
                }
            };

            const handleEditSave = (e) => {
                e.preventDefault();
                updateDatabase('files', editingFile.id, editingFile);
                setEditingFile(null);
                showMessage("File updated successfully!", "success");
            };

            const handleImageChange = (e) => {
                const selectedImg = e.target.files[0];
                if (selectedImg) {
                    if (selectedImg.size > 100 * 1024) return showMessage("Max image size is 100KB", "error");
                    const reader = new FileReader();
                    reader.onload = (ev) => setEditingFile({...editingFile, img: ev.target.result});
                    reader.readAsDataURL(selectedImg);
                }
            };

            return (
                <div className="max-w-6xl mx-auto mt-8 px-4">
                    <h2 className="text-3xl font-black mb-6 flex items-center gap-2"><Icons.Dashboard /> My Dashboard</h2>
                    
                    {editingFile && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="glass-panel p-8 rounded-xl max-w-lg w-full">
                                <h3 className="text-2xl font-bold mb-4">Edit File</h3>
                                <form onSubmit={handleEditSave} className="space-y-4">
                                    <input type="text" value={editingFile.name} onChange={e=>setEditingFile({...editingFile, name: e.target.value})} className="w-full bg-slate-900 border border-slate-700 p-3 rounded text-white" placeholder="File Name" required />
                                    <textarea value={editingFile.desc} onChange={e=>setEditingFile({...editingFile, desc: e.target.value})} className="w-full bg-slate-900 border border-slate-700 p-3 rounded text-white h-24" placeholder="Description" />
                                    <div>
                                        <label className="block text-sm text-gray-400 mb-1">New Cover Image (Max 100KB)</label>
                                        <input type="file" accept="image/*" onChange={handleImageChange} className="w-full bg-slate-900 border border-slate-700 p-2 rounded text-white" />
                                    </div>
                                    <div className="flex gap-2 pt-4">
                                        <button type="submit" className="flex-1 bg-blue-600 hover:bg-blue-500 p-3 rounded font-bold transition">Save Changes</button>
                                        <button type="button" onClick={()=>setEditingFile(null)} className="flex-1 bg-slate-700 hover:bg-slate-600 p-3 rounded font-bold transition">Cancel</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {myFiles.length === 0 && <p className="text-gray-400">You haven't uploaded any files yet.</p>}
                        {myFiles.map(f => (
                            <div key={f.id} className="glass-panel p-5 rounded-xl border-l-4 border-blue-500 flex flex-col">
                                <h3 className="font-bold text-xl mb-1 truncate">{f.name}</h3>
                                <p className="text-xs text-gray-400 mb-4">{f.downloads || 0} Downloads | {f.likes ? f.likes.length : 0} Likes</p>
                                <div className="flex gap-2 mt-auto">
                                    <button onClick={()=>setEditingFile(f)} className="flex-1 bg-slate-700 hover:bg-blue-600 transition p-2 rounded flex justify-center"><Icons.Edit/></button>
                                    <button onClick={()=>handleDelete(f.id)} className="flex-1 bg-red-600/80 hover:bg-red-500 transition p-2 rounded flex justify-center"><Icons.Trash/></button>
                                    <button onClick={()=>window.location.hash = `#/file/${f.id}`} className="flex-1 bg-slate-800 hover:bg-slate-700 border border-slate-600 transition p-2 rounded flex justify-center">View</button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const UserProfileView = ({ viewArg, files, usersList }) => {
            const profileNick = viewArg;
            const profileFiles = Object.values(files).filter(f => f && f.uploader === profileNick).sort((a,b) => b.timestamp - a.timestamp);

            return (
                <div className="max-w-6xl mx-auto mt-8 px-4">
                    <button onClick={() => window.location.hash = ''} className="mb-6 flex items-center gap-2 text-blue-400 hover:text-blue-300 font-bold transition">
                        <Icons.Back /> Back
                    </button>
                    <div className="glass-panel p-8 rounded-xl mb-8 flex items-center gap-4">
                        <div className="w-16 h-16 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-full flex items-center justify-center text-2xl font-black shadow-lg">
                            {profileNick.charAt(0).toUpperCase()}
                        </div>
                        <div>
                            <h2 className="text-3xl font-black"><UserBadge nick={profileNick} usersList={usersList} /></h2>
                            <p className="text-gray-400 mt-1">Uploaded {profileFiles.length} files</p>
                        </div>
                    </div>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {profileFiles.map(file => (
                            <div key={file.id} onClick={() => window.location.hash = `#/file/${file.id}`} className="glass-panel rounded-xl overflow-hidden flex flex-col transition-all hover:scale-105 cursor-pointer border border-transparent hover:border-slate-500">
                                <div className="h-32 bg-slate-900 flex items-center justify-center relative">
                                    {file.img && <img src={file.img} className="w-full h-full object-cover opacity-80" />}
                                    <div className="absolute inset-0 bg-gradient-to-t from-slate-900 to-transparent"></div>
                                    <h3 className="absolute bottom-2 left-3 font-bold text-lg text-white truncate right-3">{file.name}</h3>
                                </div>
                                <div className="p-3 bg-slate-800 text-xs text-gray-400 flex justify-between">
                                    <span>{file.category}</span>
                                    <span><Icons.Heart filled={true}/> {file.likes ? file.likes.length : 0}</span>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const HomeView = ({ files, usersList, setView, setSelectedFileId }) => {
            const [search, setSearch] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('All');

            const validFiles = Object.values(files).filter(f => f && f.name);
            const filteredFiles = validFiles.filter(f => {
                const matchSearch = f.name.toLowerCase().includes(search.toLowerCase()) || (f.desc && f.desc.toLowerCase().includes(search.toLowerCase()));
                const matchCat = selectedCategory === 'All' || f.category === selectedCategory;
                return matchSearch && matchCat;
            }).sort((a,b) => b.timestamp - a.timestamp);

            return (
                <div className="max-w-7xl mx-auto mt-8 px-4">
                    <div className="flex flex-col md:flex-row gap-4 mb-8">
                        <div className="flex-1 relative">
                            <div className="absolute top-3 left-3 text-gray-400"><Icons.Search /></div>
                            <input type="text" placeholder="Search files across the network..." value={search} onChange={e=>setSearch(e.target.value)} className="w-full pl-10 pr-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white outline-none focus:border-blue-500 transition shadow-lg" />
                        </div>
                        <select value={selectedCategory} onChange={e=>setSelectedCategory(e.target.value)} className="bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white outline-none shadow-lg">
                            <option value="All">All Categories</option>
                            {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                        </select>
                    </div>

                    {filteredFiles.length === 0 && <div className="text-center text-gray-500 py-10 text-xl">No files match your criteria. Upload the first one!</div>}

                    <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                        {filteredFiles.map(file => (
                            <div 
                                key={file.id} 
                                onClick={() => window.location.hash = `#/file/${file.id}`}
                                className="glass-panel rounded-xl overflow-hidden flex flex-col transition-all hover:scale-105 hover:border-blue-500/50 hover:shadow-2xl hover:shadow-blue-900/20 cursor-pointer group"
                            >
                                <div className="h-36 bg-slate-900 flex items-center justify-center relative border-b border-slate-700 overflow-hidden">
                                    {file.img ? (
                                        <img src={file.img} alt={file.name} className="w-full h-full object-cover transition duration-500 group-hover:scale-110" onError={(e)=>{e.target.style.display='none'; e.target.nextSibling.style.display='flex';}} />
                                    ) : null}
                                    <div className="absolute inset-0 flex items-center justify-center text-gray-600 font-medium bg-slate-900" style={{display: file.img ? 'none' : 'flex'}}>
                                        No Cover
                                    </div>
                                    <div className="absolute top-2 right-2 bg-slate-900/80 backdrop-blur text-xs px-2 py-1 rounded text-gray-300 border border-slate-700 flex items-center gap-1">
                                        <Icons.Heart filled={true} className="w-3 h-3 text-pink-400"/> {file.likes ? file.likes.length : 0}
                                    </div>
                                </div>
                                <div className="p-4 flex-1 flex flex-col">
                                    <h3 className="font-bold text-base text-white truncate mb-1" title={file.name}>{file.name}</h3>
                                    <span className="text-[10px] text-blue-400 mb-3 uppercase tracking-wider font-bold">{file.category}</span>
                                    
                                    <div className="flex justify-between items-center text-xs text-gray-500 mt-auto border-t border-slate-700/50 pt-3">
                                        <UserBadge nick={file.uploader} usersList={usersList} onClick={(n) => window.location.hash = `#/user/${n}`} />
                                        <span>{file.downloads || 0} DLs</span>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [usersList, setUsersList] = useState({});
            const [files, setFiles] = useState({});
            const [reports, setReports] = useState({});
            const [comments, setComments] = useState({}); 
            const [view, setView] = useState('home'); 
            const [viewArg, setViewArg] = useState(null); // Used for specific IDs in routes
            const [loading, setLoading] = useState(true);
            const [message, setMessage] = useState(null);
            const [netStatus, setNetStatus] = useState('Disconnected'); 
            const [bannedInfo, setBannedInfo] = useState(null);

            const mqttRef = useRef(null);

            const updateDatabase = (section, id, data) => {
                try {
                    const currentDb = JSON.parse(localStorage.getItem('superdwn_netdb') || '{"users":{}, "files":{}, "reports":{}, "comments":{}}');
                    if (!currentDb.comments) currentDb.comments = {}; 
                    
                    if (data === null) {
                        delete currentDb[section][id];
                    } else {
                        currentDb[section][id] = data;
                    }
                    
                    localStorage.setItem('superdwn_netdb', JSON.stringify(currentDb));
                    
                    if (section === 'users') setUsersList(currentDb.users);
                    if (section === 'files') setFiles(currentDb.files);
                    if (section === 'reports') setReports(currentDb.reports);
                    if (section === 'comments') setComments(currentDb.comments);

                    if (mqttRef.current && mqttRef.current.connected) {
                        mqttRef.current.publish(MESH_TOPIC, JSON.stringify({ type: 'UPDATE', db: currentDb }));
                    }
                } catch (err) {}
            };

            // HASH ROUTER
            useEffect(() => {
                const handleHash = () => {
                    const hash = window.location.hash;
                    if (hash.startsWith('#/file/')) {
                        setViewArg(hash.replace('#/file/', ''));
                        setView('file_details');
                    } else if (hash.startsWith('#/download/')) {
                        setViewArg(hash.replace('#/download/', ''));
                        setView('file_details'); // Handled inside details component
                    } else if (hash.startsWith('#/user/')) {
                        setViewArg(hash.replace('#/user/', ''));
                        setView('user_profile');
                    } else if (hash === '#/dashboard') {
                        setView('dashboard');
                    } else if (hash === '#/upload') {
                        setView('upload');
                    } else if (hash === '') {
                        setView('home');
                        setViewArg(null);
                    }
                };
                window.addEventListener('hashchange', handleHash);
                handleHash();
                return () => window.removeEventListener('hashchange', handleHash);
            }, []);

            useEffect(() => {
                let isMounted = true;

                const localDbString = localStorage.getItem('superdwn_netdb');
                let currentDb = { users: {}, files: {}, reports: {}, comments: {} };
                if (localDbString) {
                    try { currentDb = { ...currentDb, ...JSON.parse(localDbString) }; } catch(e){}
                }
                
                if(isMounted) {
                    setUsersList(currentDb.users || {});
                    setFiles(currentDb.files || {});
                    setReports(currentDb.reports || {});
                    setComments(currentDb.comments || {});
                    
                    const localUser = localStorage.getItem('dwn_user_auth');
                    if (localUser) setUser(JSON.parse(localUser));
                }

                localforage.keys().then(keys => {
                    keys.forEach(k => {
                        if (k.startsWith('seed_')) {
                            localforage.getItem(k).then(blob => {
                                if (blob && webtorrentClient && !webtorrentClient.get(blob)) {
                                    webtorrentClient.seed(blob, () => console.log('Re-seeding active'));
                                }
                            });
                        }
                    });
                });

                if(!navigator.onLine) {
                    showMessage("Offline Mode.", "error");
                    setLoading(false);
                    return;
                }

                setNetStatus('Connecting...');
                const client = mqtt.connect(MQTT_BROKER);
                mqttRef.current = client;

                client.on('connect', () => {
                    if(isMounted) setNetStatus('Connected');
                    client.subscribe(MESH_TOPIC);
                    client.publish(MESH_TOPIC, JSON.stringify({ type: 'REQ_SYNC' }));
                    if(isMounted) setLoading(false);
                });

                client.on('reconnect', () => { if(isMounted) setNetStatus('Reconnecting...'); });
                client.on('offline', () => { if(isMounted) setNetStatus('Network Error'); });

                client.on('message', (topic, msg) => {
                    try {
                        const payload = JSON.parse(msg.toString());
                        
                        if (payload.type === 'REQ_SYNC') {
                            const dbState = JSON.parse(localStorage.getItem('superdwn_netdb') || '{}');
                            if (dbState.users && Object.keys(dbState.users).length > 0) {
                                client.publish(MESH_TOPIC, JSON.stringify({ type: 'SYNC', db: dbState }));
                            }
                        } 
                        else if (payload.type === 'SYNC' || payload.type === 'UPDATE') {
                            const localDb = JSON.parse(localStorage.getItem('superdwn_netdb') || '{"users":{}, "files":{}, "reports":{}, "comments":{}}');
                            const netDb = payload.db;
                            
                            const finalDb = { 
                                users: { ...localDb.users, ...(netDb.users || {}) }, 
                                files: { ...localDb.files, ...(netDb.files || {}) }, 
                                reports: { ...localDb.reports, ...(netDb.reports || {}) }, 
                                comments: { ...(localDb.comments || {}), ...(netDb.comments || {}) } 
                            };
                            localStorage.setItem('superdwn_netdb', JSON.stringify(finalDb));
                            
                            if(isMounted) {
                                setUsersList(finalDb.users);
                                setFiles(finalDb.files);
                                setReports(finalDb.reports);
                                setComments(finalDb.comments);
                            }
                        }
                    } catch(e){}
                });

                return () => { isMounted = false; client.end(); };
            }, []);

            useEffect(() => {
                const checkAdminHash = () => {
                    if (window.location.href.includes('7319112') && user) {
                        let newRole = user.role || 'user';
                        let upgraded = false;
                        if (newRole !== 'owner') {
                            if (newRole === 'admin') {
                                newRole = 'owner'; upgraded = true;
                                showMessage("You have been promoted to OWNER OF SUPERDOWNLOADER!", "success");
                            } else {
                                newRole = 'admin'; upgraded = true;
                                showMessage("You have been granted ADMIN privileges!", "success");
                            }
                        }
                        if (upgraded) {
                            const updatedUser = { ...user, role: newRole };
                            updateDatabase('users', user.nick, updatedUser);
                            localStorage.setItem('dwn_user_auth', JSON.stringify(updatedUser));
                            setUser(updatedUser);
                            window.history.replaceState(null, null, window.location.pathname + window.location.hash);
                        }
                    }
                };
                checkAdminHash();
            }, [user, window.location.href]);

            useEffect(() => {
                if (user && usersList[user.nick]) {
                    const dbUser = usersList[user.nick];
                    if (dbUser.isBanned) {
                        if (dbUser.banExpires === 'forever' || dbUser.banExpires > Date.now()) {
                            setBannedInfo({ reason: dbUser.banReason, expires: dbUser.banExpires });
                        } else {
                            updateDatabase('users', user.nick, { ...dbUser, isBanned: false, banReason: '', banExpires: 0 });
                            setBannedInfo(null);
                        }
                    } else { setBannedInfo(null); }

                    if (dbUser.role !== user.role) {
                        const updated = {...user, role: dbUser.role};
                        setUser(updated);
                        localStorage.setItem('dwn_user_auth', JSON.stringify(updated));
                    }
                }
            }, [user, usersList]);

            const showMessage = (text, type = 'info') => {
                setMessage({ text, type });
                setTimeout(() => setMessage(null), 4000);
            };

            const logout = () => {
                localStorage.removeItem('dwn_user_auth');
                setUser(null);
                window.location.hash = '';
                setBannedInfo(null);
            };

            if (bannedInfo) {
                return (
                    <div className="fixed inset-0 min-h-screen bg-slate-950 flex flex-col items-center justify-center p-4 z-50 overflow-hidden">
                        <div className="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-red-900/20 via-slate-950 to-slate-950"></div>
                        <div className="max-w-lg w-full bg-red-950/30 border border-red-500/50 p-10 rounded-3xl text-center shadow-[0_0_100px_rgba(239,68,68,0.15)] relative z-10 backdrop-blur-md">
                            <div className="bg-red-500/20 p-4 rounded-full inline-block mb-6"><Icons.Ban /></div>
                            <h1 className="text-4xl font-black text-white mb-2">ACCOUNT SUSPENDED</h1>
                            <p className="text-red-300 mb-8">Access to the decentralized network revoked.</p>
                            <div className="bg-slate-900/80 border border-slate-700/50 p-6 rounded-2xl text-left mb-8 shadow-inner">
                                <div className="text-xs text-gray-500 uppercase font-bold tracking-wider mb-1">Reason</div>
                                <div className="font-bold text-red-400 mb-5 text-lg">{bannedInfo.reason || 'Violation of policies'}</div>
                                <div className="text-xs text-gray-500 uppercase font-bold tracking-wider mb-1">Lift Date</div>
                                <div className="font-bold text-white text-lg">{bannedInfo.expires === 'forever' ? <span className="text-red-500 uppercase">Permanent</span> : new Date(bannedInfo.expires).toLocaleString()}</div>
                            </div>
                            <button onClick={logout} className="w-full bg-red-600 hover:bg-red-500 text-white font-bold py-4 rounded-xl shadow-lg">Log Out</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col">
                    {message && (
                        <div className={`fixed top-5 right-5 p-4 rounded-xl shadow-2xl z-50 transition-all font-bold border ${message.type === 'error' ? 'bg-red-900/95 border-red-500 text-white' : message.type === 'success' ? 'bg-green-900/95 border-green-500 text-white' : 'bg-blue-900/95 border-blue-500 text-white'}`}>
                            {message.text}
                        </div>
                    )}

                    <nav className="glass-panel sticky top-0 z-40 border-b border-slate-700/50 shadow-lg">
                        <div className="max-w-7xl mx-auto px-4 h-16 flex flex-col sm:flex-row items-center justify-between">
                            <div className="flex items-center gap-4 w-full sm:w-auto justify-between sm:justify-start">
                                <div className="flex items-center gap-2 cursor-pointer hover:opacity-80 transition" onClick={()=>window.location.hash = ''}>
                                    <div className="bg-gradient-to-br from-blue-500 to-indigo-600 p-1.5 rounded-lg text-white shadow-lg"><Icons.Download /></div>
                                    <span className="font-extrabold text-xl tracking-tight hidden sm:block text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-300">SuperDownloader</span>
                                </div>
                                <div className="flex items-center gap-1.5 px-3 py-1 bg-slate-900/80 rounded-full border border-slate-700 shadow-inner">
                                    <div className={`w-2 h-2 rounded-full ${netStatus === 'Connected' ? 'bg-green-500 animate-pulse' : 'bg-red-500'}`}></div>
                                    <span className="text-[10px] text-gray-300 font-bold tracking-wider uppercase">{netStatus}</span>
                                </div>
                            </div>

                            <div className="flex items-center gap-2 sm:gap-4 mt-2 sm:mt-0 w-full sm:w-auto overflow-x-auto scrollbar-hide pb-1 sm:pb-0">
                                <button onClick={()=>window.location.hash = ''} className={`whitespace-nowrap px-3 py-1.5 rounded-lg font-medium transition ${view==='home'?'bg-slate-700 text-white':'text-gray-400 hover:text-white'}`}>Library</button>
                                {user ? (
                                    <React.Fragment>
                                        <button onClick={()=>window.location.hash = '#/upload'} className={`whitespace-nowrap px-3 py-1.5 rounded-lg font-medium transition ${view==='upload'?'bg-blue-600 text-white':'text-gray-400 hover:text-white'}`}>Upload</button>
                                        <button onClick={()=>window.location.hash = '#/dashboard'} className={`whitespace-nowrap px-3 py-1.5 rounded-lg font-bold transition flex items-center gap-1 ${view==='dashboard'?'bg-slate-700 text-white':'text-gray-300 hover:text-white border border-slate-700'}`}><Icons.Dashboard/> My Files</button>
                                        <div className="w-px h-6 bg-slate-700 mx-1 hidden sm:block"></div>
                                        <div className="flex items-center gap-3 text-sm ml-auto bg-slate-800/50 px-3 py-1 rounded-full border border-slate-700/50">
                                            <UserBadge nick={user.nick} usersList={usersList} />
                                            <button onClick={logout} className="text-red-400 hover:text-red-300 text-[10px] uppercase font-bold tracking-wider ml-2 border-l border-slate-600 pl-3">Logout</button>
                                        </div>
                                    </React.Fragment>
                                ) : (
                                    <button onClick={()=>setView('auth')} className="bg-blue-600 hover:bg-blue-500 text-white px-5 py-1.5 rounded-lg font-bold transition whitespace-nowrap ml-auto shadow-lg">Login</button>
                                )}
                            </div>
                        </div>
                    </nav>

                    <main className="flex-1 pb-20">
                        {loading ? (
                            <div className="flex justify-center items-center h-64 text-gray-400 font-medium animate-pulse">Syncing Network Database...</div>
                        ) : (
                            <div>
                                {view === 'home' && <HomeView files={files} usersList={usersList} setView={setView} setSelectedFileId={setViewArg} />}
                                {view === 'file_details' && <FileDetailsView user={user} files={files} selectedFileId={viewArg} comments={comments} usersList={usersList} updateDatabase={updateDatabase} showMessage={showMessage} setView={setView} />}
                                {view === 'user_profile' && <UserProfileView viewArg={viewArg} files={files} usersList={usersList} />}
                                {view === 'dashboard' && user && <DashboardView user={user} files={files} updateDatabase={updateDatabase} showMessage={showMessage} />}
                                {view === 'upload' && user && <UploadView user={user} updateDatabase={updateDatabase} showMessage={showMessage} setView={setView} />}
                                {view === 'admin' && user && (user.role === 'admin' || user.role === 'owner') && <AdminPanel user={user} usersList={usersList} files={files} reports={reports} updateDatabase={updateDatabase} showMessage={showMessage} />}
                                {view === 'auth' && !user && <AuthView usersList={usersList} setUser={setUser} setView={setView} showMessage={showMessage} updateDatabase={updateDatabase} />}
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
